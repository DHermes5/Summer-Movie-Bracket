const ROUND_NAMES = ["Round of 64","Round of 32","Sweet 16","Elite 8","Final Four","Championship"];

  {id:"beach",name:"BEACH",icon:"&#127958;",color:"#FFD166",movies:["Jaws","The Sandlot","Grease","Mamma Mia!","Top Gun","Dirty Dancing","Lilo & Stitch","Blue Crush","Baywatch","Cocktail","Weekend at Bernies","Into the Blue","The Beach","The Blue Lagoon","Overboard","Summer Rental"]},

async function dbRead(){
  const r=await fetch("https://api.jsonbin.io/v3/b/"+BIN+"/latest",{headers:{"X-Master-Key":KEY}});
  if(!r.ok) throw new Error("Read failed "+r.status);
  return (await r.json()).record;
}
async function dbWrite(data){
  const r=await fetch("https://api.jsonbin.io/v3/b/"+BIN,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":KEY},body:JSON.stringify(data)});
  if(!r.ok) throw new Error("Write failed "+r.status);
  return r.json();
}

function gk(ri,r,mi){return ri+"_"+r+"_"+mi;}

function getSurvivor(ri,rIdx,mi,actuals){
  if(rIdx===0) return {top:REGIONS[ri].movies[mi*2],bot:REGIONS[ri].movies[mi*2+1]};
  const p0=getSurvivor(ri,rIdx-1,mi*2,actuals);
  const p1=getSurvivor(ri,rIdx-1,mi*2+1,actuals);
  const w0=actuals[gk(ri,rIdx-1,mi*2)];
  const w1=actuals[gk(ri,rIdx-1,mi*2+1)];
  return{top:w0?(w0==="top"?p0.top:p0.bot):null,bot:w1?(w1==="top"?p1.top:p1.bot):null};
}

function getRegionChamp(ri,actuals){
  const s=getSurvivor(ri,3,0,actuals);
  const w=actuals[gk(ri,3,0)];
  return w?(w==="top"?s.top:s.bot):null;
}

function deriveRegion(ri,picks){
  const rounds=[];
  rounds.push(Array.from({length:8},(_,i)=>({top:REGIONS[ri].movies[i*2],bot:REGIONS[ri].movies[i*2+1],winner:picks[gk(ri,0,i)]||null})));
  for(let r=1;r<=3;r++){
    const prev=rounds[r-1],cur=[];
    for(let m=0;m<prev.length/2;m++){
      const a=prev[m*2],b=prev[m*2+1];
      cur.push({top:a.winner?(a.winner==="top"?a.top:a.bot):null,bot:b.winner?(b.winner==="top"?b.top:b.bot):null,winner:picks[gk(ri,r,m)]||null});
    }
    rounds.push(cur);
  }
  return rounds;
}

function deriveFinals(picks,rr){
  const champs=rr.map(r=>{const e=r[3][0];return e.winner?(e.winner==="top"?e.top:e.bot):null;});
  const ff=[{top:champs[0],bot:champs[1],winner:picks["ff_0"]||null},{top:champs[2],bot:champs[3],winner:picks["ff_1"]||null}];
  const ct=ff[0].winner?(ff[0].winner==="top"?ff[0].top:ff[0].bot):null;
  const cb=ff[1].winner?(ff[1].winner==="top"?ff[1].top:ff[1].bot):null;
  return{ff,champ:{top:ct,bot:cb,winner:picks["champ"]||null}};
}

function getChampion(picks){
  const rr=REGIONS.map((_,ri)=>deriveRegion(ri,picks));
  const{champ}=deriveFinals(picks,rr);
  return champ.winner?(champ.winner==="top"?champ.top:champ.bot):null;
}

function scoreBracket(picks,actuals){
  return Object.entries(actuals).reduce((s,[key,val])=>{
    if(picks[key]!==val) return s;
    const r=key.startsWith("ff")?4:key==="champ"?5:parseInt(key.split("_")[1]);
    return s+(PTS[Math.min(r,5)]||1);
  },0);
}

function freshData(){return{entries:{},rounds:{current:0,deadlines:{},locked:{},actualWinners:{}},roundVotes:{}};}

// ---- Matchup ----
function Matchup({m,picked,actual,onPick,color,isR0,seed0,seed1}){
  return h("div",{style:{display:"flex",flexDirection:"column",gap:2,margin:"2px 0"}},
    ["top","bot"].map((side,si)=>{
      const movie=m[side],isPicked=picked===side,isAW=actual===side,isAL=actual&&actual!==side;
      const isRight=isAW&&isPicked,isWrong=isAL&&isPicked,empty=!movie;
      const bg=isRight?"rgba(6,214,160,0.14)":isWrong?"rgba(239,71,111,0.08)":isPicked?(color+"18"):"rgba(255,255,255,0.04)";
      const border="1px solid "+(isRight?"#06D6A0":isWrong?"#EF476F":isPicked?color:"rgba(255,255,255,0.07)");
      return h("div",{key:side,className:"matchup-side",onClick:()=>!empty&&onPick&&onPick(side),
        style:{background:bg,border,opacity:isAL?0.32:1,cursor:(!empty&&onPick)?"pointer":"default"}},
        isR0&&h("span",{style:{fontSize:6,color,opacity:0.6,minWidth:9,flexShrink:0}},si===0?seed0:seed1),
        h("span",{style:{fontSize:9,color:isAW?"#06D6A0":empty?"rgba(255,255,255,0.2)":"#FFFDF7",flex:1,lineHeight:1.2,fontStyle:empty?"italic":"normal"}},
          empty?"TBD":movie.length>19?movie.slice(0,18)+"...":movie),
        isPicked&&!actual&&h("span",{style:{fontSize:7,color,flexShrink:0}},"✓"),
        isRight&&h("span",{style:{fontSize:8,flexShrink:0}},"✓"),
        isWrong&&h("span",{style:{fontSize:8,flexShrink:0}},"✗"),
        isAW&&h("span",{style:{fontSize:8,color:"#06D6A0",flexShrink:0}},"★")
      );
    })
  );
}

function HomeScreen({appData,setScreen,setViewId}){

  const current=rounds.current||0;
  const deadlines=rounds.deadlines||{};

  const bracketOpen=!locked[0];
  const currentVotes=(roundVotes[current]||[]);
  const scored=Object.entries(entries).map(([id,e])=>({id,...e,score:scoreBracket(e.picks,actuals)})).sort((a,b)=>b.score-a.score);

  function handleLookup(){
    const n=nameQ.trim().toLowerCase();
    const found=Object.entries(entries).find(([,e])=>e.name.toLowerCase()===n);
    if(found){setViewId(found[0]);setScreen("view");}
    else setLookErr("No bracket found with that name.");

  function handleAdmin(){
    if(pin===PIN){setScreen("admin");setPinErr(false);}

  return h("div",{className:"screen"},
    h("div",{style:{textAlign:"center",marginBottom:40}},

      h("h1",{style:{fontSize:"clamp(26px,6vw,48px)",fontWeight:900,margin:0,lineHeight:1.05,letterSpacing:2,background:"linear-gradient(135deg,#FFD166,#FF6B00,#EF476F)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"SUMMER CINEMA\nSHOWDOWN"),
      h("p",{style:{color:"#FFD166",letterSpacing:4,fontSize:10,marginTop:10}},"H-TOWN ACCOUNTING - 64 FILMS - 6 ROUNDS"),
      h("div",{style:{display:"inline-flex",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,marginTop:16,overflow:"hidden"}},
        [{label:"Brackets",value:Object.keys(entries).length,color:"#FFD166"},{label:"Round",value:ROUND_NAMES[current],color:"#FF6B00"},{label:"Status",value:locked[current]?"Locked":"Open",color:"#06D6A0"}].map((s,i)=>
          h("div",{key:i,style:{padding:"12px 20px",textAlign:"center",borderRight:i<2?"1px solid rgba(255,255,255,0.08)":"none"}},
            h("div",{style:{fontSize:20,fontWeight:700,color:s.color}},s.value),
            h("div",{style:{fontSize:8,letterSpacing:2,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",marginTop:3}},s.label)
          )
        )
      )
    ),
    h("div",{style:{display:"flex",gap:3,marginBottom:28,overflowX:"auto",paddingBottom:4}},
      ROUND_NAMES.map((n,i)=>{
        const active=i===current,past=i<current,dl=deadlines[i];
        return h("div",{key:i,style:{flex:1,minWidth:72,textAlign:"center",padding:"8px 4px",borderRadius:8,background:active?"rgba(255,107,0,0.12)":past?"rgba(6,214,160,0.05)":"rgba(255,255,255,0.03)",border:"1px solid "+(active?"#FF6B00":past?"rgba(6,214,160,0.25)":"rgba(255,255,255,0.06)")}},
          h("div",{style:{fontSize:8,fontWeight:700,letterSpacing:1,color:active?"#FF6B00":past?"#06D6A0":"rgba(255,255,255,0.25)",textTransform:"uppercase"}},n),
          dl&&h("div",{style:{fontSize:7,color:"rgba(255,255,255,0.25)",marginTop:2}},new Date(dl).toLocaleDateString()),
          locked[i]&&h("div",{style:{fontSize:7,color:"#EF476F",marginTop:1}},"Locked")

    h("div",{style:{display:"flex",gap:10,marginBottom:28,flexWrap:"wrap"}},

          pinErr&&h("div",{className:"err"},"Wrong PIN"),
          h("button",{className:"btn",onClick:handleAdmin},"Enter Admin")
        )
    )
  );
}

// ---- Entry Screen ----
function EntryScreen({appData,save,onBack}){
  const [name,setName]=useState("");
  const [dept,setDept]=useState("");
  const [picks,setPicks]=useState({});
  const [step,setStep]=useState("info");
  const [infoErr,setInfoErr]=useState("");
  const [submitErr,setSubmitErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [success,setSuccess]=useState(false);
  const entries=appData.entries||{};

  function handleInfoNext(){
    if(!name.trim()){setInfoErr("Please enter your name.");return;}
    const dup=Object.values(entries).find(e=>e.name.toLowerCase()===name.trim().toLowerCase());
    if(dup){setInfoErr("A bracket with that name already exists.");return;}
    setInfoErr("");setStep("bracket");
  }

  async function handleSubmit(){
    const done=Object.keys(picks).length;
    if(done<63){setSubmitErr("Complete all picks first ("+done+"/63 done).");return;}
    setBusy(true);
    const d=JSON.parse(JSON.stringify(appData));
    const id="e_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
    d.entries[id]={name:name.trim(),dept:dept.trim(),picks,submittedAt:new Date().toISOString()};
    await save(d);
    setSuccess(true);setBusy(false);
  }

  function setPick(key,val){setPicks(p=>({...p,[key]:val}));setSubmitErr("");}

  if(success) return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:20}},
    h("div",{style:{fontSize:56}},"🎉"),
    h("h2",{style:{fontSize:28,color:"#06D6A0",margin:0}},"Bracket Submitted!"),
    h("p",{style:{color:"rgba(255,255,255,0.5)",textAlign:"center",maxWidth:340}},"Good luck, "+name+"!"),

// ---- Round Vote Screen ----
function RoundVoteScreen({appData,save,onBack}){
  const rounds=appData.rounds||{};
  const current=rounds.current||0;
  const actuals=rounds.actualWinners||{};
  const locked=rounds.locked||{};
  const isOpen=current>0&&locked[current-1]&&!locked[current];
  const [picks,setPicks]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const [busy,setBusy]=useState(false);
  const pts=PTS[Math.min(current,5)]||1;

  const matchups=[];
  if(isOpen){
    if(current>=1&&current<=3){
      REGIONS.forEach((reg,ri)=>{
        const count=Math.pow(2,3-current);
        for(let mi=0;mi<count;mi++){
          const s=getSurvivor(ri,current,mi,actuals);
          if(s.top||s.bot) matchups.push({key:gk(ri,current,mi),top:s.top,bot:s.bot,color:reg.color,label:reg.name});
        }
      });
    } else if(current===4){
      const c=[0,1,2,3].map(ri=>getRegionChamp(ri,actuals));
      if(c[0]||c[1]) matchups.push({key:"ff_0",top:c[0],bot:c[1],color:"#FFD166",label:"Final Four"});
      if(c[2]||c[3]) matchups.push({key:"ff_1",top:c[2],bot:c[3],color:"#FFD166",label:"Final Four"});
    } else if(current===5){
      const c=[0,1,2,3].map(ri=>getRegionChamp(ri,actuals));
      const top=actuals["ff_0"]?(actuals["ff_0"]==="top"?c[0]:c[1]):null;
      const bot=actuals["ff_1"]?(actuals["ff_1"]==="top"?c[2]:c[3]):null;
      if(top||bot) matchups.push({key:"champ",top,bot,color:"#FF6B00",label:"Championship"});
    }
  }

  if(!isOpen) return h("div",{style:{position:"relative",zIndex:1,maxWidth:500,margin:"0 auto",padding:"60px 20px",textAlign:"center"}},
    h("button",{onClick:onBack,style:{background:"none",border:"none",color:"rgba(255,255,255,0.35)",cursor:"pointer",fontSize:22}},"<"),
    h("div",{style:{marginTop:20}},
      h("div",{style:{fontSize:48,marginBottom:16}},"🔒"),
      h("h2",{style:{color:"#FFD166",marginBottom:8}},"Voting Not Open Yet"),
      h("p",{style:{color:"rgba(255,255,255,0.4)",fontSize:13}},"Round voting opens once the previous round is locked. Check back soon!"),
      h("button",{className:"btn",onClick:onBack,style:{marginTop:24}},"Back to Home")
    )
  );

  if(submitted) return h("div",{style:{position:"relative",zIndex:1,maxWidth:500,margin:"0 auto",padding:"60px 20px",textAlign:"center"}},
    h("div",{style:{fontSize:56,marginBottom:16}},"🗳️"),
    h("h2",{style:{color:"#06D6A0",marginBottom:8}},"Vote Submitted!"),
    h("p",{style:{color:"rgba(255,255,255,0.4)",fontSize:13}},"Your picks for "+ROUND_NAMES[current]+" are in. "+pts+" pt"+(pts!==1?"s":"")+" per correct pick!"),
    h("button",{className:"btn btn-primary",onClick:onBack,style:{marginTop:24}},"Back to Home")
  );

  async function handleSubmit(){
    if(Object.keys(picks).length<matchups.length){alert("Please pick a winner for every matchup!");return;}
    setBusy(true);
    const d=JSON.parse(JSON.stringify(appData));
    d.roundVotes=d.roundVotes||{};
    d.roundVotes[current]=d.roundVotes[current]||[];
    d.roundVotes[current].push({picks,submittedAt:new Date().toISOString()});
    await save(d);
    setSubmitted(true);setBusy(false);
  }

  return h("div",{style:{position:"relative",zIndex:1,maxWidth:700,margin:"0 auto",padding:"24px 16px 80px"}},
    h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:24,flexWrap:"wrap"}},
      h("button",{onClick:onBack,style:{background:"none",border:"none",color:"rgba(255,255,255,0.35)",cursor:"pointer",fontSize:22}},"<"),
      h("div",{style:{flex:1}},
        h("h2",{style:{margin:0,fontSize:20,color:"#FFD166"}},ROUND_NAMES[current]+" - Round Vote"),
        h("p",{style:{margin:0,fontSize:11,color:"rgba(255,255,255,0.35)"}},pts+" pt"+(pts!==1?"s":"")+" per correct pick - Anonymous")
      ),
      h(ProgPill,{done:Object.keys(picks).length,total:matchups.length})
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
      matchups.map(({key,top,bot,color,label})=>{
        const picked=picks[key];
        return h("div",{key,className:"card"},
          h("div",{style:{fontSize:8,letterSpacing:2,color:"rgba(255,255,255,0.3)",marginBottom:8}},label),
          h("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
            [[top,"top"],[bot,"bot"]].map(([movie,side])=>{
              if(!movie) return null;
              const sel=picked===side;
              return h("div",{key:side,onClick:()=>setPicks(p=>({...p,[key]:side})),
                style:{flex:"1 1 140px",padding:"10px 14px",borderRadius:8,cursor:"pointer",background:sel?"rgba(255,107,0,0.15)":"rgba(255,255,255,0.04)",border:"2px solid "+(sel?color:"rgba(255,255,255,0.08)"),transition:"all 0.15s",display:"flex",alignItems:"center",gap:8}},
                h("div",{style:{width:16,height:16,borderRadius:"50%",border:"2px solid "+(sel?color:"rgba(255,255,255,0.2)"),background:sel?color:"transparent",flexShrink:0}}),
                h("span",{style:{fontSize:12,color:sel?"#FFFDF7":"rgba(255,255,255,0.7)",fontWeight:sel?700:400}},movie)
              );
            })
          )
        );
      })
    ),
    h("div",{style:{textAlign:"center",marginTop:28}},
      h("button",{className:"btn btn-primary",onClick:handleSubmit,disabled:busy,style:{fontSize:14,padding:"12px 36px"}},busy?"Saving...":"Submit My Votes")
    )
  );
}

function AdminResults({actuals,patch,list}){
  function tally(key){let t=0,b=0;list.forEach(([,e])=>{if(e.picks[key]==="top")t++;else if(e.picks[key]==="bot")b++;});return{t,b,total:t+b};}

  const allMatchups=[];
  REGIONS.forEach((reg,ri)=>{
    [0,1,2,3].forEach(rIdx=>{
      const count=Math.pow(2,3-rIdx);
      for(let mi=0;mi<count;mi++){
        const s=getSurvivor(ri,rIdx,mi,actuals);
        allMatchups.push({key:gk(ri,rIdx,mi),label:reg.name+" - "+["R64","R32","Sweet 16","Elite 8"][rIdx]+" - Match "+(mi+1),top:s.top,bot:s.bot,color:reg.color});
      }
    });
  });
  const c=[0,1,2,3].map(ri=>getRegionChamp(ri,actuals));
  const ff0w=actuals["ff_0"],ff1w=actuals["ff_1"];
  const ffTop=ff0w?(ff0w==="top"?c[0]:c[1]):null;
  const ffBot=ff1w?(ff1w==="top"?c[2]:c[3]):null;
  allMatchups.push({key:"ff_0",label:"Final Four - Semifinal 1",top:c[0],bot:c[1],color:"#FFD166"});
  allMatchups.push({key:"ff_1",label:"Final Four - Semifinal 2",top:c[2],bot:c[3],color:"#FFD166"});
  allMatchups.push({key:"champ",label:"Championship",top:ffTop,bot:ffBot,color:"#FF6B00"});

  return h("div",null,
    h("p",{style:{color:"rgba(255,255,255,0.4)",fontSize:12,marginTop:0}},"Click a film to mark it as the actual winner. Scores update instantly."),
    allMatchups.map(({key,label,top,bot,color})=>{
      if(!top&&!bot) return null;
      const {t,b,total}=tally(key),actual=actuals[key];
      const tp=total>0?Math.round(t/total*100):50,bp=100-tp;
      return h("div",{key,style:{marginBottom:8,background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"10px 12px",border:"1px solid rgba(255,255,255,0.05)"}},
        h("div",{style:{fontSize:8,color:"rgba(255,255,255,0.3)",letterSpacing:2,marginBottom:7}},label),
        [[top,"top",t,tp],[bot,"bot",b,bp]].map(([movie,side,votes,pct])=>{
          if(!movie) return null;
          const isA=actual===side;
          return h("div",{key:side,onClick:()=>patch(d=>{d.rounds.actualWinners=d.rounds.actualWinners||{};if(d.rounds.actualWinners[key]===side)delete d.rounds.actualWinners[key];else d.rounds.actualWinners[key]=side;}),
            style:{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,marginBottom:3,cursor:"pointer",background:isA?"rgba(6,214,160,0.1)":"rgba(255,255,255,0.02)",border:"1px solid "+(isA?"#06D6A0":"rgba(255,255,255,0.04)"),transition:"all 0.15s"}},
            h("div",{style:{width:14,height:14,borderRadius:"50%",border:"2px solid "+(isA?"#06D6A0":"rgba(255,255,255,0.15)"),background:isA?"#06D6A0":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#04252F",fontWeight:700}},isA?"*":""),
            h("span",{style:{flex:1,fontSize:11,color:isA?"#06D6A0":"#FFFDF7"}},movie),
            h("div",{style:{width:60,height:4,background:"rgba(255,255,255,0.07)",borderRadius:2,overflow:"hidden"}},h("div",{style:{height:"100%",width:pct+"%",background:color,borderRadius:2}})),
            h("span",{style:{fontSize:10,color,minWidth:50,textAlign:"right"}},votes+" ("+pct+"%)")
          );
        })
      );
    })
  );
}

      const tally={};
      votes.forEach(v=>{Object.entries(v.picks||{}).forEach(([k,s])=>{tally[k]=tally[k]||{top:0,bot:0};tally[k][s]=(tally[k][s]||0)+1;});});
      return h("div",{key:i,style:{marginBottom:16,background:"rgba(255,255,255,0.02)",borderRadius:10,padding:"12px 14px",border:"1px solid rgba(255,255,255,0.06)"}},
        h("div",{style:{fontWeight:700,color:"#FFD166",fontSize:13,marginBottom:2}},name),
        h("div",{style:{fontSize:10,color:"rgba(255,255,255,0.35)",marginBottom:8}},votes.length+" votes - "+PTS[Math.min(i,5)]+" pts per correct pick"),
        votes.length===0&&h("div",{style:{fontSize:11,color:"rgba(255,255,255,0.2)"}},"No votes yet")
      );
    })
  );
}

// ---- Root App ----
function App(){
  const [screen,setScreen]=useState("home");
  const [appData,setAppData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [viewId,setViewId]=useState(null);

  useEffect(()=>{load();},[]);
  useEffect(()=>{
    if(screen==="home"||screen==="admin"){
      const t=setInterval(load,12000);
      return()=>clearInterval(t);
    }
  },[screen]);

  async function load(){
    try{
      const d=await dbRead();
      setAppData(d&&d.entries?d:freshData());
      setError(null);
    }catch(e){
      setError(e.message);
      setAppData(prev=>prev||freshData());
    }finally{setLoading(false);}
  }

  async function save(newData){
    try{
      const fresh=await dbRead();
      const merged=JSON.parse(JSON.stringify(fresh||freshData()));
      if(newData.entries) Object.assign(merged.entries,newData.entries);
      if(newData.rounds) merged.rounds=newData.rounds;
      if(newData.roundVotes){
        merged.roundVotes=merged.roundVotes||{};
        Object.entries(newData.roundVotes).forEach(([r,votes])=>{
          merged.roundVotes[r]=merged.roundVotes[r]||[];
          const existing=new Set(merged.roundVotes[r].map(v=>v.submittedAt));
          (votes||[]).forEach(v=>{if(!existing.has(v.submittedAt))merged.roundVotes[r].push(v);});
        });
      }
      await dbWrite(merged);
      setAppData(merged);
      setError(null);
    }catch(e){setError("Save failed: "+e.message);}
  }

  if(loading) return h(Loader,null);

  return h("div",{style:{minHeight:"100vh",background:"#04252F",fontFamily:"Georgia,serif",color:"#FFFDF7"}},
    error&&h(ErrorBanner,{msg:error,onDismiss:()=>setError(null)}),
    screen==="home"&&h(HomeScreen,{appData,setScreen,setViewId}),
    screen==="entry"&&h(EntryScreen,{appData,save,onBack:()=>setScreen("home")}),
    screen==="roundvote"&&h(RoundVoteScreen,{appData,save,onBack:()=>setScreen("home")}),
    screen==="admin"&&h(AdminScreen,{appData,save,onBack:()=>setScreen("home"),setViewId,setScreen}),
    screen==="view"&&h(ViewScreen,{appData,entryId:viewId,onBack:()=>setScreen("home")})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
