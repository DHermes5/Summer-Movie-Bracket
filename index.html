<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summer Cinema Showdown – H-Town Accounting</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #04252F; color: #FFFDF7; font-family: 'Georgia', serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── CONFIG ──────────────────────────────────────────────────────────────────
    const JSONBIN_API_KEY = "";
    const JSONBIN_BIN_ID  = "";
    const ADMIN_PIN   = "htown2025";

    // ─── DATA ────────────────────────────────────────────────────────────────────
    const REGIONS = [
      { id:"beach", name:"BEACH", icon:"🏖️", color:"#FFD166", movies:[
        "Jaws","The Sandlot","Grease","Mamma Mia!","Top Gun","Dirty Dancing",
        "Lilo & Stitch","Blue Crush","Baywatch","Cocktail","Weekend at Bernie's",
        "Into the Blue","The Beach","The Blue Lagoon","Overboard","Summer Rental"]},
      { id:"sun",   name:"SUN",   icon:"☀️", color:"#FF6B00", movies:[
        "Stand By Me","The Goonies","Ferris Bueller's Day Off","Superbad","Risky Business",
        "Fast Times at Ridgemont High","Dazed and Confused","American Graffiti","Wet Hot American Summer",
        "Nat'l Lampoon's Vacation","Caddyshack","Meatballs","Porky's","Heavyweights","Camp Nowhere","Sisterhood of the Traveling Pants"]},
      { id:"wave",  name:"WAVE",  icon:"🌊", color:"#06D6A0", movies:[
        "Point Break","Cast Away","The Notebook","Forgetting Sarah Marshall","50 First Dates",
        "Under the Tuscan Sun","Eat Pray Love","Roman Holiday","Enchanted April","Summer I Turned Pretty",
        "Blue Hawaii","South Pacific","Splash","Aquamarine","Fool's Gold","Overboard (1987)"]},
      { id:"heat",  name:"HEAT",  icon:"🔥", color:"#EF476F", movies:[
        "Jurassic Park","Independence Day","Men in Black","The Dark Knight","Iron Man",
        "Avengers: Endgame","Guardians of the Galaxy","Spider-Man: No Way Home","Top Gun: Maverick",
        "Mission: Impossible","Transformers","Pirates of the Caribbean","Raiders of the Lost Ark",
        "Indiana Jones & Temple of Doom","Aliens","The Terminator"]},
    ];

    const ROUND_NAMES = ["Round of 64","Round of 32","Sweet 16","Elite 8","Final Four","Championship"];

    // ─── JSONBIN API ─────────────────────────────────────────────────────────────
    let _apiKey = JSONBIN_API_KEY;
    let _binId  = JSONBIN_BIN_ID;

    function setCredentials(key, bin) { _apiKey = key; _binId = bin; }

    async function dbRead() {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${_binId}/latest`, {
        headers: { "X-Master-Key": _apiKey },
      });
      if (!res.ok) throw new Error(`Read failed: ${res.status}`);
      const json = await res.json();
      return json.record;
    }

    async function dbWrite(data) {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${_binId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": _apiKey },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error(`Write failed: ${res.status}`);
      return res.json();
    }

    async function dbCreate(data) {
      const res = await fetch("https://api.jsonbin.io/v3/b", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": _apiKey,
          "X-Bin-Name": "HTownBracket",
          "X-Bin-Private": "false",
        },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error(`Create failed: ${res.status}`);
      const json = await res.json();
      return json.metadata.id;
    }

    // ─── BRACKET LOGIC ───────────────────────────────────────────────────────────
    function getKey(ri, r, mi) { return `${ri}_${r}_${mi}`; }

    function deriveRegion(ri, picks) {
      const rounds = [];
      rounds.push(Array.from({length:8},(_,i)=>({
        top: REGIONS[ri].movies[i*2], bot: REGIONS[ri].movies[i*2+1],
        winner: picks[getKey(ri,0,i)]||null
      })));
      for (let r=1;r<=3;r++) {
        const prev=rounds[r-1], cur=[];
        for (let m=0;m<prev.length/2;m++) {
          const a=prev[m*2], b=prev[m*2+1];
          cur.push({
            top: a.winner?(a.winner==="top"?a.top:a.bot):null,
            bot: b.winner?(b.winner==="top"?b.top:b.bot):null,
            winner: picks[getKey(ri,r,m)]||null
          });
        }
        rounds.push(cur);
      }
      return rounds;
    }

    function deriveFinals(picks, regionRounds) {
      const champs = regionRounds.map(rr=>{ const e=rr[3][0]; return e.winner?(e.winner==="top"?e.top:e.bot):null; });
      const ff = [
        {top:champs[0],bot:champs[1],winner:picks["ff_0"]||null},
        {top:champs[2],bot:champs[3],winner:picks["ff_1"]||null},
      ];
      const ct = ff[0].winner?(ff[0].winner==="top"?ff[0].top:ff[0].bot):null;
      const cb = ff[1].winner?(ff[1].winner==="top"?ff[1].top:ff[1].bot):null;
      return { ff, champ:{top:ct,bot:cb,winner:picks["champ"]||null} };
    }

    function getChampion(picks) {
      const rr = REGIONS.map((_,ri)=>deriveRegion(ri,picks));
      const {champ} = deriveFinals(picks,rr);
      return champ.winner?(champ.winner==="top"?champ.top:champ.bot):null;
    }

    function countPicks(picks) { return Object.keys(picks).length; }

    const PTS = [1,2,4,8,16,32];
    function score(picks, actuals) {
      return Object.entries(actuals).reduce((s,[key,val])=>{
        if (picks[key]!==val) return s;
        const parts=key.split("_");
        const r = key.startsWith("ff")?4:key==="champ"?5:parseInt(parts[1]);
        return s+(PTS[Math.min(r,5)]||1);
      },0);
    }

    function freshData() {
      return { entries:{}, rounds:{current:0,deadlines:{},locked:{},actualWinners:{}} };
    }

    // ─── SHARED UI ───────────────────────────────────────────────────────────────
    const iStyle = { background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#FFFDF7",padding:"9px 13px",fontSize:13,fontFamily:"'Georgia',serif",outline:"none",width:"100%",boxSizing:"border-box" };
    const lblStyle = { display:"flex",flexDirection:"column",gap:5,fontSize:9,letterSpacing:2,color:"rgba(255,255,255,0.4)",textTransform:"uppercase" };

    function BgGlow() {
      return (
        <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
          <div style={{position:"absolute",top:"-30%",left:"50%",transform:"translateX(-50%)",width:"140%",height:"80%",background:"radial-gradient(ellipse at 50% 0%,rgba(255,107,0,0.07) 0%,rgba(255,209,102,0.03) 30%,transparent 70%)"}}/>
        </div>
      );
    }

    function ErrorBanner({ msg, onDismiss }) {
      return (
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:999,background:"rgba(239,71,111,0.9)",color:"#fff",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:12}}>
          <span>⚠️ {msg}</span>
          <button onClick={onDismiss} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:16}}>×</button>
        </div>
      );
    }

    function Card({ title, children, style={} }) {
      return (
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"14px",...style}}>
          {title&&<div style={{fontFamily:"'Georgia',serif",fontSize:12,color:"#FFD166",letterSpacing:1,marginBottom:12,paddingBottom:10,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>{title}</div>}
          {children}
        </div>
      );
    }

    function Btn({ children, onClick, primary, disabled, style={} }) {
      return (
        <button onClick={onClick} disabled={disabled} style={{padding:"8px 16px",borderRadius:8,border:`1px solid ${primary?"transparent":"rgba(255,255,255,0.13)"}`,background:primary?"linear-gradient(135deg,#FF6B00,#EF476F)":"rgba(255,255,255,0.05)",color:"#FFFDF7",fontWeight:700,fontSize:11,letterSpacing:1,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,fontFamily:"'Georgia',serif",transition:"all 0.15s",whiteSpace:"nowrap",...style}}>
          {children}
        </button>
      );
    }

    function BackBtn({ onClick }) {
      return <button onClick={onClick} style={{background:"none",border:"none",color:"rgba(255,255,255,0.35)",cursor:"pointer",fontSize:22,lineHeight:1,padding:"0 4px",flexShrink:0}}>←</button>;
    }

    function ProgPill({ done, total }) {
      const pct=Math.round(done/total*100);
      return (
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:72,height:5,background:"rgba(255,255,255,0.1)",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:pct===100?"#06D6A0":"#FF6B00",borderRadius:3,transition:"width 0.3s"}}/>
          </div>
          <span style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{done}/{total}</span>
        </div>
      );
    }

    function Loader() {
      return <div style={{minHeight:"100vh",background:"#04252F",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14}}><div style={{fontSize:48}}>☀️</div><div style={{color:"#FFD166",letterSpacing:6,fontSize:12}}>LOADING…</div></div>;
    }

    function Err({ children, style={} }) {
      return <div style={{color:"#EF476F",fontSize:11,marginTop:4,...style}}>{children}</div>;
    }

    // ─── MATCHUP & BRACKET GRIDS ─────────────────────────────────────────────────
    function Matchup({ m, picked, actual, onPick, color, isR0, seed0, seed1 }) {
      return (
        <div style={{display:"flex",flexDirection:"column",gap:1.5,margin:"2px 0"}}>
          {["top","bot"].map((side,si)=>{
            const movie=m[side], isPicked=picked===side;
            const isAW=actual===side, isAL=actual&&actual!==side;
            const isRight=isAW&&isPicked, isWrong=isAL&&isPicked;
            const empty=!movie;
            return (
              <div key={side} onClick={()=>!empty&&onPick&&onPick(side)}
                style={{display:"flex",alignItems:"center",gap:4,padding:"3.5px 6px",borderRadius:5,minHeight:21,
                  background:isRight?"rgba(6,214,160,0.14)":isWrong?"rgba(239,71,111,0.08)":isPicked?`${color}18`:"rgba(255,255,255,0.04)",
                  border:`1px solid ${isRight?"#06D6A0":isWrong?"#EF476F":isPicked?color:"rgba(255,255,255,0.07)"}`,
                  cursor:!empty&&onPick?"pointer":"default",opacity:isAL?0.32:1,transition:"all 0.13s"}}>
                {isR0&&<span style={{fontSize:6.5,color:color,opacity:0.6,minWidth:9,flexShrink:0}}>{si===0?seed0:seed1}</span>}
                <span style={{fontSize:9.5,color:isAW?"#06D6A0":empty?"rgba(255,255,255,0.2)":"#FFFDF7",flex:1,lineHeight:1.2,fontStyle:empty?"italic":"normal"}}>
                  {empty?"TBD":movie.length>19?movie.slice(0,18)+"…":movie}
                </span>
                {isPicked&&!actual&&<span style={{fontSize:7.5,color,flexShrink:0}}>✓</span>}
                {isRight&&<span style={{fontSize:8,flexShrink:0}}>✅</span>}
                {isWrong&&<span style={{fontSize:8,flexShrink:0}}>❌</span>}
                {isAW&&<span style={{fontSize:8,color:"#06D6A0",flexShrink:0}}>★</span>}
              </div>
            );
          })}
        </div>
      );
    }

    function RegionGrid({ reg, ri, rounds, picks, onPick, actuals }) {
      const rNames=["R64","R32","Sweet 16","Elite 8"];
      return (
        <div style={{marginBottom:24,background:"rgba(255,255,255,0.02)",border:`1px solid ${reg.color}20`,borderRadius:12,padding:"14px 10px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:16}}>{reg.icon}</span>
            <span style={{fontFamily:"'Georgia',serif",fontSize:14,fontWeight:700,color:reg.color,letterSpacing:3}}>{reg.name} REGION</span>
          </div>
          <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:2}}>
            {rounds.map((round,rIdx)=>(
              <div key={rIdx} style={{flex:rIdx===0?"2 0 155px":"1 0 108px",minWidth:rIdx===0?148:100}}>
                <div style={{fontSize:7,letterSpacing:2,color:"rgba(255,255,255,0.25)",textAlign:"center",marginBottom:5,textTransform:"uppercase"}}>{rNames[rIdx]}</div>
                <div style={{display:"flex",flexDirection:"column",gap:2}}>
                  {round.map((m,mi)=>{
                    const key=getKey(ri,rIdx,mi);
                    return <Matchup key={mi} m={m} picked={picks[key]} actual={actuals[key]} onPick={onPick?side=>onPick(key,side):null} color={reg.color} isR0={rIdx===0} seed0={mi*2+1} seed1={mi*2+2} />;
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function FinalsGrid({ ff, champ, picks, onPick, actuals }) {
      const champion=getChampion(picks);
      return (
        <div style={{background:"rgba(255,209,102,0.03)",border:"1px solid rgba(255,209,102,0.12)",borderRadius:12,padding:"14px 10px",marginBottom:20}}>
          <div style={{fontFamily:"'Georgia',serif",fontSize:14,color:"#FFD166",letterSpacing:3,marginBottom:14}}>🏅 FINAL FOUR &amp; CHAMPIONSHIP</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {ff.map((m,i)=>(
              <div key={i} style={{flex:"1 1 150px"}}>
                <div style={{fontSize:7,letterSpacing:2,color:"rgba(255,255,255,0.25)",marginBottom:5}}>SEMIFINAL {i+1}</div>
                <Matchup m={m} picked={picks[`ff_${i}`]} actual={actuals[`ff_${i}`]} onPick={onPick?side=>onPick(`ff_${i}`,side):null} color="#FFD166" />
              </div>
            ))}
            <div style={{flex:"1 1 150px"}}>
              <div style={{fontSize:7,letterSpacing:2,color:"rgba(255,255,255,0.25)",marginBottom:5}}>CHAMPIONSHIP</div>
              <Matchup m={champ} picked={picks["champ"]} actual={actuals["champ"]} onPick={onPick?side=>onPick("champ",side):null} color="#FF6B00" />
            </div>
            {champion&&(
              <div style={{flex:"1 1 130px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,textAlign:"center"}}>
                <div style={{fontSize:26}}>🏆</div>
                <div style={{fontSize:8,letterSpacing:2,color:"#06D6A0"}}>YOUR CHAMPION</div>
                <div style={{fontFamily:"'Georgia',serif",fontSize:13,color:"#FFD166",fontWeight:700}}>{champion}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── SETUP SCREEN ─────────────────────────────────────────────────────────────
    function SetupScreen({ creds, setCreds, onDone }) {
      const [key, setKey]   = useState(creds.key||"");
      const [bin, setBin]   = useState(creds.bin||"");
      const [step, setStep] = useState("key");
      const [busy, setBusy] = useState(false);
      const [err, setErr]   = useState("");
      const [newBin, setNewBin] = useState("");

      async function handleKeyNext() {
        if (!key.trim()) { setErr("Paste your Master Key."); return; }
        setErr(""); setStep("bin");
      }

      async function handleCreateBin() {
        setBusy(true); setErr("");
        setCredentials(key.trim(), "");
        try {
          const id = await dbCreate(freshData());
          setNewBin(id); setBin(id); setStep("done");
        } catch(e) { setErr(e.message); }
        setBusy(false);
      }

      async function handleUseBin() {
        if (!bin.trim()) { setErr("Paste your Bin ID."); return; }
        setBusy(true); setErr("");
        setCredentials(key.trim(), bin.trim());
        try { await dbRead(); await onDone(key.trim(), bin.trim()); }
        catch(e) { setErr("Could not read bin — check your Bin ID."); setBusy(false); }
      }

      async function handleFinish() {
        setBusy(true);
        await onDone(key.trim(), newBin);
        setBusy(false);
      }

      return (
        <div style={{minHeight:"100vh",background:"#04252F",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <BgGlow />
          <div style={{position:"relative",zIndex:1,maxWidth:520,width:"100%"}}>
            <div style={{textAlign:"center",marginBottom:36}}>
              <div style={{fontSize:48,marginBottom:8}}>☀️</div>
              <h1 style={{fontFamily:"'Georgia',serif",fontSize:28,background:"linear-gradient(135deg,#FFD166,#FF6B00)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:0}}>Summer Cinema Showdown</h1>
              <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,letterSpacing:3,marginTop:6}}>H-TOWN ACCOUNTING · SETUP</p>
            </div>
            <Card>
              {step==="key" && <>
                <h3 style={{color:"#FFD166",margin:"0 0 16px",fontSize:16}}>Step 1 — Get a free JSONBin API Key</h3>
                <ol style={{color:"rgba(255,255,255,0.6)",fontSize:13,lineHeight:2,paddingLeft:20,margin:"0 0 20px"}}>
                  <li>Go to <a href="https://jsonbin.io" target="_blank" style={{color:"#06D6A0"}}>jsonbin.io</a> and click <b style={{color:"#fff"}}>Sign Up Free</b></li>
                  <li>After logging in, click <b style={{color:"#fff"}}>API Keys</b> in the left sidebar</li>
                  <li>Copy your <b style={{color:"#fff"}}>Master Key</b> (starts with <code style={{color:"#FFD166"}}>$2a$10$</code>)</li>
                  <li>Paste it below</li>
                </ol>
                <label style={lblStyle}>Master Key
                  <input value={key} onChange={e=>{setKey(e.target.value);setErr("");}} placeholder="$2a$10$..." style={iStyle} />
                </label>
                {err && <Err>{err}</Err>}
                <Btn primary onClick={handleKeyNext} style={{marginTop:16,width:"100%"}}>Next →</Btn>
              </>}

              {step==="bin" && <>
                <h3 style={{color:"#FFD166",margin:"0 0 8px",fontSize:16}}>Step 2 — Create or connect a Bin</h3>
                <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginTop:0,marginBottom:20}}>A "bin" is where all bracket data lives.</p>
                <Btn primary onClick={handleCreateBin} disabled={busy} style={{width:"100%",marginBottom:12}}>
                  {busy?"Creating…":"✨ Create New Bin for Me"}
                </Btn>
                <div style={{textAlign:"center",color:"rgba(255,255,255,0.3)",fontSize:12,margin:"8px 0"}}>— or use existing —</div>
                <label style={lblStyle}>Existing Bin ID
                  <input value={bin} onChange={e=>{setBin(e.target.value);setErr("");}} placeholder="67a1b2c3d4e5f6..." style={iStyle} />
                </label>
                {err && <Err>{err}</Err>}
                <div style={{display:"flex",gap:8,marginTop:16}}>
                  <Btn onClick={()=>setStep("key")} style={{flex:1}}>← Back</Btn>
                  <Btn primary onClick={handleUseBin} disabled={busy} style={{flex:2}}>{busy?"Connecting…":"Connect Bin →"}</Btn>
                </div>
              </>}

              {step==="done" && <>
                <div style={{textAlign:"center",marginBottom:20}}>
                  <div style={{fontSize:40,marginBottom:8}}>🎉</div>
                  <h3 style={{color:"#06D6A0",margin:"0 0 8px"}}>Bin Created!</h3>
                  <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,margin:0}}>Save this Bin ID so you can reconnect later:</p>
                </div>
                <div style={{background:"rgba(6,214,160,0.08)",border:"1px solid #06D6A0",borderRadius:8,padding:"12px 16px",fontFamily:"monospace",fontSize:13,color:"#06D6A0",wordBreak:"break-all",marginBottom:20,textAlign:"center"}}>
                  {newBin}
                </div>
                <p style={{color:"rgba(255,255,255,0.4)",fontSize:11,textAlign:"center",margin:"0 0 16px"}}>
                  ⚠️ Keep your API key and Bin ID private.
                </p>
                <Btn primary onClick={handleFinish} disabled={busy} style={{width:"100%"}}>{busy?"Loading…":"Launch App →"}</Btn>
              </>}
            </Card>
          </div>
        </div>
      );
    }

    // ─── HOME SCREEN ─────────────────────────────────────────────────────────────
    function HomeScreen({ appData, setScreen, setViewId, save }) {
      const [showAdmin, setShowAdmin] = useState(false);
      const [pin, setPin]             = useState("");
      const [pinErr, setPinErr]       = useState(false);
      const [nameQ, setNameQ]         = useState("");
      const [lookErr, setLookErr]     = useState("");

      const entries   = appData?.entries   || {};
      const rounds    = appData?.rounds    || {};
      const actuals   = rounds.actualWinners || {};
      const locked    = rounds.locked      || {};
      const current   = rounds.current     ?? 0;
      const count     = Object.keys(entries).length;
      const deadlines = rounds.deadlines   || {};

      const scored = Object.entries(entries)
        .map(([id,e])=>({id,...e,score:score(e.picks,actuals)}))
        .sort((a,b)=>b.score-a.score);

      function handleLookup() {
        const n = nameQ.trim().toLowerCase();
        const found = Object.entries(entries).find(([,e])=>e.name.toLowerCase()===n);
        if (found) { setViewId(found[0]); setScreen("view"); }
        else setLookErr("No bracket found with that name.");
      }

      function handleAdmin() {
        if (pin===ADMIN_PIN) { setScreen("admin"); setPinErr(false); }
        else setPinErr(true);
      }

      return (
        <div style={{position:"relative",zIndex:1,maxWidth:700,margin:"0 auto",padding:"36px 16px 80px"}}>
          <div style={{textAlign:"center",marginBottom:40}}>
            <div style={{fontSize:52,marginBottom:8}}>☀️</div>
            <h1 style={{fontFamily:"'Georgia',serif",fontSize:"clamp(26px,6vw,52px)",fontWeight:900,margin:0,lineHeight:1.05,letterSpacing:2,background:"linear-gradient(135deg,#FFD166,#FF6B00,#EF476F)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
              SUMMER CINEMA<br/>SHOWDOWN
            </h1>
            <p style={{color:"#FFD166",letterSpacing:4,fontSize:10,marginTop:10,opacity:0.8}}>H-TOWN ACCOUNTING · 64 FILMS · 6 ROUNDS</p>

            <div style={{display:"inline-flex",gap:0,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,marginTop:16,overflow:"hidden"}}>
              {[
                {label:"Brackets In",value:count,color:"#FFD166"},
                {label:"Round",value:ROUND_NAMES[current],color:"#FF6B00"},
                {label:"Status",value:locked[current]?"🔒 Locked":"✅ Open",color:"#06D6A0"},
              ].map((s,i)=>(
                <div key={i} style={{padding:"12px 20px",textAlign:"center",borderRight:i<2?"1px solid rgba(255,255,255,0.08)":"none"}}>
                  <div style={{fontFamily:"'Georgia',serif",fontSize:20,fontWeight:700,color:s.color}}>{s.value}</div>
                  <div style={{fontSize:8,letterSpacing:2,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",marginTop:3}}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{display:"flex",gap:3,marginBottom:28,overflowX:"auto",paddingBottom:4}}>
            {ROUND_NAMES.map((n,i)=>{
              const active=i===current, past=i<current, dl=deadlines[i];
              return (
                <div key={i} style={{flex:1,minWidth:72,textAlign:"center",padding:"8px 4px",borderRadius:8,background:active?"rgba(255,107,0,0.12)":past?"rgba(6,214,160,0.05)":"rgba(255,255,255,0.03)",border:`1px solid ${active?"#FF6B00":past?"rgba(6,214,160,0.25)":"rgba(255,255,255,0.06)"}`}}>
                  <div style={{fontSize:8,fontWeight:700,letterSpacing:1,color:active?"#FF6B00":past?"#06D6A0":"rgba(255,255,255,0.25)",textTransform:"uppercase"}}>{n}</div>
                  {dl&&<div style={{fontSize:7,color:"rgba(255,255,255,0.25)",marginTop:2}}>{new Date(dl).toLocaleDateString()}</div>}
                  {locked[i]&&<div style={{fontSize:7,color:"#EF476F",marginTop:1}}>🔒</div>}
                </div>
              );
            })}
          </div>

          <Btn primary onClick={()=>setScreen("entry")} disabled={locked[0]} style={{width:"100%",fontSize:15,padding:"14px",marginBottom:28,letterSpacing:2}}>
            {locked[0]?"🔒 Bracket Submission Closed":"🎬 Fill Out My Bracket"}
          </Btn>

          <Card title="📋 Find My Bracket" style={{marginBottom:20}}>
            <div style={{display:"flex",gap:8}}>
              <input value={nameQ} onChange={e=>{setNameQ(e.target.value);setLookErr("");}}
                placeholder="Your name…" style={{...iStyle,flex:1}}
                onKeyDown={e=>e.key==="Enter"&&handleLookup()} />

            </div>
            {lookErr&&<Err style={{marginTop:8}}>{lookErr}</Err>}

          {scored.length>0&&(
            <Card title="🏆 Leaderboard" style={{marginBottom:20}}>
              {scored.slice(0,10).map((e,i)=>(
                <div key={e.id} onClick={()=>{setViewId(e.id);setScreen("view");}}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.04)"}}
                  onMouseEnter={el=>el.currentTarget.style.background="rgba(255,209,102,0.07)"}
                  onMouseLeave={el=>el.currentTarget.style.background="transparent"}>
                  <span style={{width:22,fontSize:13,textAlign:"center",flexShrink:0}}>
                    {i===0?"🥇":i===1?"🥈":i===2?"🥉":<span style={{color:"rgba(255,255,255,0.3)",fontSize:10}}>{i+1}</span>}
                  </span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700}}>{e.name}</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.35)"}}>{e.dept||"—"} · {getChampion(e.picks)||"No champion yet"}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:"#FFD166",fontWeight:700,fontSize:16,fontFamily:"'Georgia',serif"}}>{e.score}</div>
                    <div style={{fontSize:8,color:"rgba(255,255,255,0.3)",letterSpacing:1}}>PTS</div>
                  </div>
                </div>
              ))}
            </Card>
          )}

          <div style={{textAlign:"center",marginTop:32}}>
            {!showAdmin
              ? <button onClick={()=>setShowAdmin(true)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.18)",fontSize:10,letterSpacing:2,cursor:"pointer",textTransform:"uppercase"}}>Admin Access</button>
              : <div style={{display:"inline-flex",flexDirection:"column",gap:8,alignItems:"center"}}>

    // ─── ENTRY SCREEN ─────────────────────────────────────────────────────────────
    function EntryScreen({ appData, save, onBack }) {
      const [name, setName]     = useState("");
      const [dept, setDept]     = useState("");
      const [picks, setPicks]   = useState({});
      const [step, setStep]     = useState("info");
      const [infoErr, setInfoErr] = useState("");
      const [submitErr, setSubmitErr] = useState("");
      const [busy, setBusy]     = useState(false);
      const [success, setSuccess] = useState(false);

      const entries = appData?.entries || {};

      function handleInfoNext() {
        if (!name.trim()) { setInfoErr("Please enter your name."); return; }
        const dup = Object.values(entries).find(e=>e.name.toLowerCase()===name.trim().toLowerCase());
        if (dup) { setInfoErr("A bracket with that name already exists. Use 'Find My Bracket' on the home screen."); return; }
        setInfoErr(""); setStep("bracket");
      }

      async function handleSubmit() {
        const done = countPicks(picks);
        if (done < 63) { setSubmitErr(`Complete all picks first (${done}/63 done).`); return; }
        setBusy(true);
        const d = JSON.parse(JSON.stringify(appData));
        const id = `e_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
        d.entries[id] = { name:name.trim(), dept:dept.trim(), picks, submittedAt:new Date().toISOString() };
        await save(d);
        setSuccess(true); setBusy(false);
      }

      function setPick(key, val) {
        setPicks(p => ({ ...p, [key]:val }));
        setSubmitErr("");
      }

      if (success) return (
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:20,position:"relative",zIndex:1}}>
          <div style={{fontSize:56}}>🎉</div>
          <h2 style={{fontFamily:"'Georgia',serif",fontSize:28,color:"#06D6A0",margin:0}}>Bracket Submitted!</h2>
          <p style={{color:"rgba(255,255,255,0.5)",textAlign:"center",maxWidth:340}}>Good luck, {name}! Check the leaderboard after each round to see how you're doing.</p>
          <Btn primary onClick={onBack} style={{marginTop:8}}>← Back to Home</Btn>
        </div>
      );

      if (step==="info") return (
        <div style={{position:"relative",zIndex:1,maxWidth:460,margin:"0 auto",padding:"40px 20px"}}>
          <BackBtn onClick={onBack} />
          <h2 style={{fontFamily:"'Georgia',serif",fontSize:26,color:"#FFD166",margin:"16px 0 6px"}}>Your Info</h2>
          <p style={{color:"rgba(255,255,255,0.4)",fontSize:13,marginBottom:28}}>Enter your details before picking your bracket.</p>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <label style={lblStyle}>Full Name *<input value={name} onChange={e=>{setName(e.target.value);setInfoErr("");}} placeholder="Jamie Garcia" style={iStyle} /></label>
            <label style={lblStyle}>Department<input value={dept} onChange={e=>setDept(e.target.value)} placeholder="Tax, Audit, Advisory…" style={iStyle} /></label>
            {infoErr&&<Err>{infoErr}</Err>}
            <Btn primary onClick={handleInfoNext} style={{marginTop:8}}>Continue → Fill Bracket</Btn>
          </div>
        </div>
      );

      const regionRounds = REGIONS.map((_,ri)=>deriveRegion(ri,picks));
      const {ff,champ}   = deriveFinals(picks, regionRounds);
      const done         = countPicks(picks);

      return (
        <div style={{position:"relative",zIndex:1,maxWidth:960,margin:"0 auto",padding:"20px 12px 80px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20,flexWrap:"wrap"}}>
            <BackBtn onClick={()=>setStep("info")} />
            <div style={{flex:1}}>
              <h2 style={{margin:0,fontFamily:"'Georgia',serif",fontSize:20,color:"#FFD166"}}>{name}'s Bracket</h2>
              <p style={{margin:0,fontSize:11,color:"rgba(255,255,255,0.35)"}}>{done}/63 picks · click a film to advance it</p>
            </div>
            <ProgPill done={done} total={63} />
            <Btn primary onClick={handleSubmit} disabled={busy}>{busy?"Saving…":"Submit Bracket ✓"}</Btn>
          </div>
          {submitErr&&<div style={{background:"rgba(239,71,111,0.12)",border:"1px solid #EF476F",borderRadius:8,padding:"10px 14px",color:"#EF476F",fontSize:12,marginBottom:16}}>{submitErr}</div>}

          {REGIONS.map((reg,ri)=>(
            <RegionGrid key={ri} reg={reg} ri={ri} rounds={regionRounds[ri]} picks={picks} onPick={setPick} actuals={{}} />
          ))}
          <FinalsGrid ff={ff} champ={champ} picks={picks} onPick={setPick} actuals={{}} />

          <div style={{textAlign:"center",marginTop:28}}>
            {submitErr&&<Err style={{marginBottom:12}}>{submitErr}</Err>}
            <Btn primary onClick={handleSubmit} disabled={busy} style={{fontSize:15,padding:"13px 36px"}}>
              {busy?"Saving…":`Submit My Bracket (${done}/63)`}
            </Btn>
          </div>
        </div>
      );
    }

    // ─── VIEW SCREEN ─────────────────────────────────────────────────────────────
    function ViewScreen({ appData, entryId, onBack }) {
      const entry   = appData?.entries?.[entryId];
      const actuals = appData?.rounds?.actualWinners || {};
      if (!entry) return <div style={{padding:40,textAlign:"center",color:"rgba(255,255,255,0.4)"}}>Entry not found.<br/><br/><Btn onClick={onBack}>← Back</Btn></div>;
      const picks = entry.picks;
      const rr    = REGIONS.map((_,ri)=>deriveRegion(ri,picks));
      const {ff,champ} = deriveFinals(picks,rr);
      const pts   = score(picks,actuals);
      const champ_movie = getChampion(picks);
      return (
        <div style={{position:"relative",zIndex:1,maxWidth:960,margin:"0 auto",padding:"20px 12px 80px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20,flexWrap:"wrap"}}>
            <BackBtn onClick={onBack} />
            <div style={{flex:1}}>
              <h2 style={{margin:0,fontFamily:"'Georgia',serif",fontSize:20,color:"#FFD166"}}>{entry.name}'s Bracket</h2>
              <p style={{margin:0,fontSize:11,color:"rgba(255,255,255,0.35)"}}>{entry.dept||"—"} · {new Date(entry.submittedAt).toLocaleDateString()} · Champion: {champ_movie||"Not picked"}</p>
            </div>
            <div style={{background:"rgba(255,209,102,0.08)",border:"1px solid rgba(255,209,102,0.3)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontFamily:"'Georgia',serif",fontSize:22,color:"#FFD166",fontWeight:700}}>{pts}</div>
              <div style={{fontSize:8,letterSpacing:2,color:"rgba(255,255,255,0.35)"}}>POINTS</div>
            </div>
          </div>
          {REGIONS.map((reg,ri)=>(
            <RegionGrid key={ri} reg={reg} ri={ri} rounds={rr[ri]} picks={picks} onPick={null} actuals={actuals} />
          ))}
          <FinalsGrid ff={ff} champ={champ} picks={picks} onPick={null} actuals={actuals} />
        </div>
      );
    }

    // ─── ADMIN SCREEN ────────────────────────────────────────────────────────────
    function AdminScreen({ appData, save, onBack, setViewId, setScreen }) {
      const [tab, setTab]   = useState("overview");
      const [busy, setBusy] = useState(false);

      const entries = appData?.entries || {};
      const rounds  = appData?.rounds  || {};
      const actuals = rounds.actualWinners || {};
      const list    = Object.entries(entries);
      const scored  = list.map(([id,e])=>({id,...e,score:score(e.picks,actuals)})).sort((a,b)=>b.score-a.score);

      async function patch(fn) {
        setBusy(true);
        const d = JSON.parse(JSON.stringify(appData));
        fn(d);
        await save(d);
        setBusy(false);
      }

      const tabs = [
        {id:"overview",label:"📊 Overview"},
        {id:"rounds",  label:"⚙️ Rounds"},
        {id:"results", label:"🏆 Results"},
        {id:"entries", label:"📋 Entries"},
      ];

      return (
        <div style={{position:"relative",zIndex:1,maxWidth:960,margin:"0 auto",padding:"20px 12px 80px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20,flexWrap:"wrap"}}>
            <BackBtn onClick={onBack} />
            <div style={{flex:1}}>
              <h2 style={{margin:0,fontFamily:"'Georgia',serif",fontSize:20,color:"#FF6B00"}}>Admin Dashboard</h2>
              <p style={{margin:0,fontSize:11,color:"rgba(255,255,255,0.35)"}}>H-Town Accounting · Summer Cinema Showdown{busy?" · Saving…":""}</p>
            </div>
            <div style={{background:"rgba(255,107,0,0.08)",border:"1px solid rgba(255,107,0,0.3)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontFamily:"'Georgia',serif",fontSize:22,color:"#FF6B00",fontWeight:700}}>{list.length}</div>
              <div style={{fontSize:8,letterSpacing:2,color:"rgba(255,255,255,0.35)"}}>BRACKETS</div>
            </div>
          </div>

          <div style={{display:"flex",gap:2,marginBottom:20,borderBottom:"1px solid rgba(255,255,255,0.07)",overflowX:"auto"}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",borderBottom:`2px solid ${tab===t.id?"#FF6B00":"transparent"}`,color:tab===t.id?"#FF6B00":"rgba(255,255,255,0.35)",padding:"8px 14px",cursor:"pointer",fontSize:11,fontWeight:700,letterSpacing:1,whiteSpace:"nowrap",marginBottom:-1}}>
                {t.label}
              </button>
            ))}
          </div>

          {tab==="overview" && <AdminOverview scored={scored} list={list} rounds={rounds} setViewId={setViewId} setScreen={setScreen} />}
          {tab==="rounds"   && <AdminRounds   rounds={rounds} patch={patch} />}
          {tab==="results"  && <AdminResults  appData={appData} actuals={actuals} patch={patch} list={list} />}
          {tab==="entries"  && <AdminEntries  scored={scored} patch={patch} setViewId={setViewId} setScreen={setScreen} />}
        </div>
      );
    }

    function AdminOverview({ scored, list, rounds, setViewId, setScreen }) {
      const complete = list.filter(([,e])=>countPicks(e.picks)>=63).length;
      return (
        <div style={{display:"flex",flexDirection:"column",gap:20}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10}}>
            {[
              {label:"Total Brackets",value:list.length,  color:"#FFD166"},
              {label:"Complete",      value:complete,       color:"#06D6A0"},
              {label:"Incomplete",    value:list.length-complete, color:"#EF476F"},
              {label:"Active Round",  value:ROUND_NAMES[rounds.current??0], color:"#FF6B00"},
            ].map(s=>(
              <div key={s.label} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"14px 12px",textAlign:"center"}}>
                <div style={{fontFamily:"'Georgia',serif",fontSize:22,color:s.color,fontWeight:700}}>{s.value}</div>
                <div style={{fontSize:8,letterSpacing:2,color:"rgba(255,255,255,0.35)",marginTop:4,textTransform:"uppercase"}}>{s.label}</div>
              </div>
            ))}
          </div>
          <Card title="🥇 Top 10">
            {scored.slice(0,10).map((e,i)=>(
              <div key={e.id} onClick={()=>{setViewId(e.id);setScreen("view");}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.04)"}}
                onMouseEnter={el=>el.currentTarget.style.background="rgba(255,209,102,0.07)"}
                onMouseLeave={el=>el.currentTarget.style.background="transparent"}>
                <span style={{width:22,textAlign:"center",fontSize:13}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":<span style={{color:"rgba(255,255,255,0.3)",fontSize:10}}>{i+1}</span>}</span>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{e.name}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.35)"}}>{e.dept}</div></div>
                <div style={{color:"#FFD166",fontWeight:700,fontSize:15,fontFamily:"'Georgia',serif"}}>{e.score} pts</div>
              </div>
            ))}
          </Card>
        </div>
      );
    }

    function AdminRounds({ rounds, patch }) {
      return (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,marginTop:0}}>Set deadlines, advance the active round, and lock rounds to freeze submissions.</p>
          {ROUND_NAMES.map((name,i)=>{
            const active=rounds.current===i, lk=rounds.locked?.[i], dl=rounds.deadlines?.[i]||"";
            return (
              <div key={i} style={{background:active?"rgba(255,107,0,0.07)":"rgba(255,255,255,0.03)",border:`1px solid ${active?"#FF6B00":"rgba(255,255,255,0.07)"}`,borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <div style={{flex:"1 1 120px"}}>
                  <div style={{fontWeight:700,color:active?"#FF6B00":"#FFFDF7",fontSize:14}}>{name}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2}}>Round {i+1}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4,flex:"1 1 180px"}}>
                  <label style={{fontSize:8,color:"rgba(255,255,255,0.35)",letterSpacing:2}}>DEADLINE</label>
                  <input type="datetime-local" value={dl}
                    onChange={e=>patch(d=>{d.rounds.deadlines=d.rounds.deadlines||{};d.rounds.deadlines[i]=e.target.value;})}
                    style={{...iStyle,fontSize:11,padding:"5px 10px"}} />
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {!active&&<Btn onClick={()=>patch(d=>d.rounds.current=i)}>Set Active</Btn>}
                  {active&&<span style={{fontSize:10,color:"#FF6B00",background:"rgba(255,107,0,0.1)",border:"1px solid #FF6B00",borderRadius:20,padding:"4px 12px"}}>● ACTIVE</span>}
                  <Btn onClick={()=>patch(d=>{d.rounds.locked=d.rounds.locked||{};d.rounds.locked[i]=!d.rounds.locked[i];})}
                    style={{borderColor:lk?"#EF476F":"",color:lk?"#EF476F":""}}>
                    {lk?"🔒 Locked":"🔓 Lock"}
                  </Btn>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function AdminResults({ appData, actuals, patch, list }) {
      const sample = list[0]?.[1]?.picks || {};
      const sRR    = REGIONS.map((_,ri)=>deriveRegion(ri,sample));
      const {ff,champ} = deriveFinals(sample,sRR);

      function tally(key) {
        let t=0,b=0;
        list.forEach(([,e])=>{ if(e.picks[key]==="top")t++; else if(e.picks[key]==="bot")b++; });
        return {t,b,total:t+b};
      }

      return (
        <div>
          <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,marginTop:0,marginBottom:16}}>Click a film to mark it as the actual winner. Scores update instantly for all brackets.</p>
          {REGIONS.map((reg,ri)=>
            sRR[ri].flatMap((round,rIdx)=>
              round.map((m,mi)=>{
                const key=getKey(ri,rIdx,mi);
                const {t,b,total}=tally(key), actual=actuals[key];
                const tp=total>0?Math.round(t/total*100):50,bp=100-tp;
                const label=`${reg.icon} ${reg.name} · ${["R64","R32","Sweet 16","Elite 8"][rIdx]} · Match ${mi+1}`;
                if(!m.top&&!m.bot)return null;
                return (
                  <div key={key} style={{marginBottom:8,background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"10px 12px",border:"1px solid rgba(255,255,255,0.05)"}}>
                    <div style={{fontSize:8,color:"rgba(255,255,255,0.3)",letterSpacing:2,marginBottom:7}}>{label}</div>
                    {[[m.top,"top",t,tp],[m.bot,"bot",b,bp]].map(([movie,side,votes,pct])=>{
                      if(!movie)return null;
                      const isA=actual===side;
                      return(
                        <div key={side} onClick={()=>patch(d=>{d.rounds.actualWinners=d.rounds.actualWinners||{};if(d.rounds.actualWinners[key]===side)delete d.rounds.actualWinners[key];else d.rounds.actualWinners[key]=side;})}
                          style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,marginBottom:3,cursor:"pointer",background:isA?"rgba(6,214,160,0.1)":"rgba(255,255,255,0.02)",border:`1px solid ${isA?"#06D6A0":"rgba(255,255,255,0.04)"}`,transition:"all 0.15s"}}>
                          <div style={{width:14,height:14,borderRadius:"50%",border:`2px solid ${isA?"#06D6A0":"rgba(255,255,255,0.15)"}`,background:isA?"#06D6A0":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#04252F",fontWeight:700}}>{isA&&"✓"}</div>
                          <span style={{flex:1,fontSize:11,color:isA?"#06D6A0":"#FFFDF7"}}>{movie}</span>
                          <div style={{width:60,height:4,background:"rgba(255,255,255,0.07)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:reg.color,borderRadius:2}}/></div>
                          <span style={{fontSize:10,color:reg.color,minWidth:50,textAlign:"right"}}>{votes} ({pct}%)</span>
                        </div>
                      );
                    })}
                  </div>
                );
              })
            )
          )}
          {[
            {label:"🏅 Final Four · Semifinal 1",key:"ff_0",top:ff[0]?.top,bot:ff[0]?.bot,color:"#FFD166"},
            {label:"🏅 Final Four · Semifinal 2",key:"ff_1",top:ff[1]?.top,bot:ff[1]?.bot,color:"#FFD166"},
            {label:"🏆 Championship",key:"champ",top:champ?.top,bot:champ?.bot,color:"#FF6B00"},
          ].map(({label,key,top,bot,color})=>{
            if(!top&&!bot)return null;
            const {t,b,total}=tally(key),actual=actuals[key];
            const tp=total>0?Math.round(t/total*100):50,bp=100-tp;
            return(
              <div key={key} style={{marginBottom:8,background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"10px 12px",border:"1px solid rgba(255,255,255,0.05)"}}>
                <div style={{fontSize:8,color:"rgba(255,255,255,0.3)",letterSpacing:2,marginBottom:7}}>{label}</div>
                {[[top,"top",t,tp],[bot,"bot",b,bp]].map(([movie,side,votes,pct])=>{
                  if(!movie)return null;
                  const isA=actual===side;
                  return(
                    <div key={side} onClick={()=>patch(d=>{d.rounds.actualWinners=d.rounds.actualWinners||{};if(d.rounds.actualWinners[key]===side)delete d.rounds.actualWinners[key];else d.rounds.actualWinners[key]=side;})}
                      style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,marginBottom:3,cursor:"pointer",background:isA?"rgba(6,214,160,0.1)":"rgba(255,255,255,0.02)",border:`1px solid ${isA?"#06D6A0":"rgba(255,255,255,0.04)"}`,transition:"all 0.15s"}}>
                      <div style={{width:14,height:14,borderRadius:"50%",border:`2px solid ${isA?"#06D6A0":"rgba(255,255,255,0.15)"}`,background:isA?"#06D6A0":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#04252F",fontWeight:700}}>{isA&&"✓"}</div>
                      <span style={{flex:1,fontSize:11,color:isA?"#06D6A0":"#FFFDF7"}}>{movie}</span>
                      <div style={{width:60,height:4,background:"rgba(255,255,255,0.07)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:2}}/></div>
                      <span style={{fontSize:10,color,minWidth:50,textAlign:"right"}}>{votes} ({pct}%)</span>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      );
    }

    function AdminEntries({ scored, patch, setViewId, setScreen }) {
      const [q, setQ] = useState("");
      const filtered = scored.filter(e=>e.name.toLowerCase().includes(q.toLowerCase())||e.dept?.toLowerCase().includes(q.toLowerCase()));
      return (
        <div>
          <div style={{marginBottom:14}}>
            <input placeholder="Search by name or department…" value={q} onChange={e=>setQ(e.target.value)} style={{...iStyle,maxWidth:340}} />
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {filtered.map((e,i)=>(
              <div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}>
                <span style={{width:26,textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.3)"}}>{i+1}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13}}>{e.name}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.35)"}}>{e.dept||"—"} · {countPicks(e.picks)}/63 picks · {new Date(e.submittedAt).toLocaleDateString()}</div>
                </div>
                <div style={{color:"#FFD166",fontWeight:700,fontSize:14}}>{e.score} pts</div>
                <Btn onClick={()=>{setViewId(e.id);setScreen("view");}}>View</Btn>
                <button onClick={()=>{if(window.confirm("Delete this entry?"))patch(d=>delete d.entries[e.id]);}} style={{background:"none",border:"none",color:"#EF476F",cursor:"pointer",fontSize:18,padding:"0 2px",lineHeight:1}}>×</button>
              </div>
            ))}
            {filtered.length===0&&<div style={{color:"rgba(255,255,255,0.3)",fontSize:13,padding:"20px",textAlign:"center"}}>No entries found.</div>}
          </div>
        </div>
      );
    }

    // ─── ROOT APP ────────────────────────────────────────────────────────────────
    function App() {
      const [creds, setCreds]       = useState({ key: JSONBIN_API_KEY, bin: JSONBIN_BIN_ID });
      const [configured, setConfigured] = useState(!!(JSONBIN_API_KEY && JSONBIN_BIN_ID));
      const [screen, setScreen]     = useState("home");
      const [appData, setAppData]   = useState(null);
      const [loading, setLoading]   = useState(true);
      const [error, setError]       = useState(null);
      const [viewId, setViewId]     = useState(null);

      useEffect(() => { if (configured) load(); else setLoading(false); }, [configured]);

      useEffect(() => {
        if (!configured) return;
        if (screen==="home"||screen==="admin") {
          const t = setInterval(load, 12000);
          return ()=>clearInterval(t);
        }
      }, [screen, configured]);

      async function load() {
        try {
          const d = await dbRead();
          setAppData(d && d.entries ? d : freshData());
          setError(null);
        } catch(e) {
          setError(e.message);
          if (!appData) setAppData(freshData());
        } finally { setLoading(false); }
      }

      async function save(newData) {
        try { await dbWrite(newData); setAppData(newData); setError(null); }
        catch(e) { setError("Save failed — check API key/bin ID."); }
      }

      if (!configured) {
        return <SetupScreen creds={creds} setCreds={setCreds} onDone={async (k,b)=>{
          setCredentials(k,b);
          setCreds({key:k,bin:b});
          setLoading(true);
          try {
            const d = await dbRead();
            setAppData(d && d.entries ? d : freshData());
            if (!(d && d.entries)) await dbWrite(freshData());
          } catch {
            try { await dbWrite(freshData()); setAppData(freshData()); } catch(e2){ setError(e2.message); }
          }
          setConfigured(true); setLoading(false);
        }} />;
      }

      if (loading) return <Loader />;

      return (
        <div style={{minHeight:"100vh",background:"#04252F",fontFamily:"'Georgia',serif",color:"#FFFDF7"}}>
          <BgGlow />
          {error && <ErrorBanner msg={error} onDismiss={()=>setError(null)} />}
          {screen==="home"  && <HomeScreen  appData={appData} setScreen={setScreen} setViewId={setViewId} save={save} />}
          {screen==="entry" && <EntryScreen appData={appData} save={save} onBack={()=>setScreen("home")} />}
          {screen==="admin" && <AdminScreen appData={appData} save={save} onBack={()=>setScreen("home")} setViewId={setViewId} setScreen={setScreen} />}
          {screen==="view"  && <ViewScreen  appData={appData} entryId={viewId} onBack={()=>setScreen("home")} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
