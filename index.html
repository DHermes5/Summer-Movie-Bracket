function setCredentials(k,b){ _apiKey=k; _binId=b; }

async function dbRead(){
  const res=await fetch("https://api.jsonbin.io/v3/b/"+_binId+"/latest",{headers:{"X-Master-Key":_apiKey}});
  if(!res.ok) throw new Error("Read failed: "+res.status);
  return (await res.json()).record;
}
async function dbWrite(data){
  const res=await fetch("https://api.jsonbin.io/v3/b/"+_binId,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":_apiKey},body:JSON.stringify(data)});
  if(!res.ok) throw new Error("Write failed: "+res.status);
  return res.json();
}

function getKey(ri,r,mi){ return ri+"_"+r+"_"+mi; }

function deriveRegion(ri,picks){
  const rounds=[];
  rounds.push(Array.from({length:8},(_,i)=>({top:REGIONS[ri].movies[i*2],bot:REGIONS[ri].movies[i*2+1],winner:picks[getKey(ri,0,i)]||null})));
  for(let r=1;r<=3;r++){
    const prev=rounds[r-1],cur=[];
    for(let m=0;m<prev.length/2;m++){
      const a=prev[m*2],b=prev[m*2+1];
      cur.push({top:a.winner?(a.winner==="top"?a.top:a.bot):null,bot:b.winner?(b.winner==="top"?b.top:b.bot):null,winner:picks[getKey(ri,r,m)]||null});
    }
    rounds.push(cur);
  }
  return rounds;
}

function deriveFinals(picks,rr){
  const champs=rr.map(r=>{const e=r[3][0];return e.winner?(e.winner==="top"?e.top:e.bot):null;});
  const ff=[{top:champs[0],bot:champs[1],winner:picks["ff_0"]||null},{top:champs[2],bot:champs[3],winner:picks["ff_1"]||null}];
  const ct=ff[0].winner?(ff[0].winner==="top"?ff[0].top:ff[0].bot):null;
  const cb=ff[1].winner?(ff[1].winner==="top"?ff[1].top:ff[1].bot):null;
  return {ff,champ:{top:ct,bot:cb,winner:picks["champ"]||null}};
}

function getChampion(picks){
  const rr=REGIONS.map((_,ri)=>deriveRegion(ri,picks));
  const {champ}=deriveFinals(picks,rr);
  return champ.winner?(champ.winner==="top"?champ.top:champ.bot):null;
}

function countPicks(picks){ return Object.keys(picks).length; }

// Score bracket picks vs actual winners
function scoreBracket(picks,actuals){
  return Object.entries(actuals).reduce((s,[key,val])=>{
    if(picks[key]!==val) return s;
    const r=key.startsWith("ff")?4:key==="champ"?5:parseInt(key.split("_")[1]);
    return s+(PTS[Math.min(r,5)]||1);
  },0);
}

// Score round votes vs actual winners — roundVotes[roundIdx][key] = "top"|"bot"
function scoreRoundVotes(roundVotes,actuals){
  let total=0;
  Object.entries(roundVotes||{}).forEach(([rIdx,votes])=>{
    Object.entries(votes||{}).forEach(([key,pick])=>{
      if(actuals[key]&&actuals[key]===pick){
        const r=key.startsWith("ff")?4:key==="champ"?5:parseInt(key.split("_")[1]);
        total+=(PTS[Math.min(r,5)]||1);
      }
    });
  });
  return total;
}

function freshData(){
  return {entries:{},rounds:{current:0,deadlines:{},locked:{},actualWinners:{}},roundVotes:{}};
}

// Build list of matchups for a given round index using actual winners to determine survivors
function getMatchupsForRound(roundIdx, actuals){
  const matchups=[];
  if(roundIdx===0){
    REGIONS.forEach((reg,ri)=>{
      for(let mi=0;mi<8;mi++){
        matchups.push({key:getKey(ri,0,mi),top:reg.movies[mi*2],bot:reg.movies[mi*2+1],color:reg.color,label:reg.icon+" "+reg.name});
      }
    });
  } else if(roundIdx>=1 && roundIdx<=3){
    REGIONS.forEach((reg,ri)=>{
      // build survivors from previous rounds
      const prevRound=roundIdx-1;
      const matchCount=8/Math.pow(2,roundIdx);
      for(let mi=0;mi<matchCount;mi++){
        const aKey=getKey(ri,prevRound,mi*2);
        const bKey=getKey(ri,prevRound,mi*2+1);
        const aW=actuals[aKey];
        const bW=actuals[bKey];
        // get the actual survivors
        const getPrev=(ri2,r,mi2)=>{
          if(r===0) return {top:REGIONS[ri2].movies[mi2*2],bot:REGIONS[ri2].movies[mi2*2+1]};
          const pp=getPrev(ri2,r-1,mi2*2);
          const pp2=getPrev(ri2,r-1,mi2*2+1);
          return {top:actuals[getKey(ri2,r-1,mi2*2)]?(actuals[getKey(ri2,r-1,mi2*2)]==="top"?pp.top:pp.bot):null,
                  bot:actuals[getKey(ri2,r-1,mi2*2+1)]?(actuals[getKey(ri2,r-1,mi2*2+1)]==="top"?pp2.top:pp2.bot):null};
        };
        const mA=getPrev(ri,prevRound,mi*2);
        const mB=getPrev(ri,prevRound,mi*2+1);
        const top=aW?(aW==="top"?mA.top:mA.bot):null;
        const bot=bW?(bW==="top"?mB.top:mB.bot):null;
        if(top||bot) matchups.push({key:getKey(ri,roundIdx,mi),top,bot,color:reg.color,label:reg.icon+" "+reg.name});
      }
    });
  } else if(roundIdx===4){
    // Final Four — need region champs
    const getChamp=(ri)=>{
      let m={top:null,bot:null};
      for(let r=0;r<=3;r++){
        if(r===0) m={top:REGIONS[ri].movies[0],bot:REGIONS[ri].movies[1]};
        else {
          const prev=actuals[getKey(ri,r-1,0)];
          // simplified: just use actuals chain
        }
      }
      // build properly
      const picks={};
      Object.entries(actuals).forEach(([k,v])=>{ if(k.startsWith(ri+"_")) picks[k]=v; });
      const rr=deriveRegion(ri,picks);
      const e=rr[3][0];
      return e.winner?(e.winner==="top"?e.top:e.bot):null;
    };
    const c0=getChamp(0),c1=getChamp(1),c2=getChamp(2),c3=getChamp(3);
    if(c0||c1) matchups.push({key:"ff_0",top:c0,bot:c1,color:"#FFD166",label:"Final Four"});
    if(c2||c3) matchups.push({key:"ff_1",top:c2,bot:c3,color:"#FFD166",label:"Final Four"});
  } else if(roundIdx===5){
    const getChamp=(ri)=>{
      const picks={};
      Object.entries(actuals).forEach(([k,v])=>{ if(k.startsWith(ri+"_")) picks[k]=v; });
      const rr=deriveRegion(ri,picks);
      const e=rr[3][0];
      return e.winner?(e.winner==="top"?e.top:e.bot):null;
    };
    const ff0w=actuals["ff_0"],ff1w=actuals["ff_1"];
    const c0=getChamp(0),c1=getChamp(1),c2=getChamp(2),c3=getChamp(3);
    const sf0={top:c0,bot:c1};
    const sf1={top:c2,bot:c3};
    const top=ff0w?(ff0w==="top"?sf0.top:sf0.bot):null;
    const bot=ff1w?(ff1w==="top"?sf1.top:sf1.bot):null;
    if(top||bot) matchups.push({key:"champ",top,bot,color:"#FF6B00",label:"Championship"});
  }
  return matchups;
}

// ── Round Vote Screen ─────────────────────────────────────────────────────────
function RoundVoteScreen({appData,save,onBack}){
  const rounds=appData.rounds||{};
  const current=rounds.current||0;
  const actuals=rounds.actualWinners||{};
  const locked=rounds.locked||{};
  const isOpen=locked[current-1]&&!locked[current]&&current>0;
  const matchups=getMatchupsForRound(current,actuals);
  const [picks,setPicks]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const [busy,setBusy]=useState(false);
  const pts=PTS[Math.min(current,5)]||1;

  if(!isOpen) return(
    <div style={{position:"relative",zIndex:1,maxWidth:500,margin:"0 auto",padding:"60px 20px",textAlign:"center"}}>
      <BackBtn onClick={onBack}/>
      <div style={{marginTop:20}}>
        <div style={{fontSize:48,marginBottom:16}}>🔒</div>
        <h2 style={{fontFamily:"'Georgia',serif",color:"#FFD166",marginBottom:8}}>Voting Not Open</h2>
        <p style={{color:"rgba(255,255,255,0.4)",fontSize:13}}>Round voting opens once the previous round is locked and the current round is active. Check back soon!</p>
        <Btn onClick={onBack} style={{marginTop:24}}>Back to Home</Btn>
      </div>
    </div>
  );

  if(submitted) return(
    <div style={{position:"relative",zIndex:1,maxWidth:500,margin:"0 auto",padding:"60px 20px",textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:16}}>🗳️</div>
      <h2 style={{fontFamily:"'Georgia',serif",color:"#06D6A0",marginBottom:8}}>Vote Submitted!</h2>
      <p style={{color:"rgba(255,255,255,0.4)",fontSize:13}}>Your picks for {ROUND_NAMES[current]} are in. Each correct pick earns {pts} point{pts!==1?"s":""}!</p>
      <Btn primary onClick={onBack} style={{marginTop:24}}>Back to Home</Btn>
    </div>
  );

  async function handleSubmit(){
    if(Object.keys(picks).length<matchups.length){alert("Please pick a winner for every matchup!");return;}
    setBusy(true);
    const d=JSON.parse(JSON.stringify(appData));
    d.roundVotes=d.roundVotes||{};
    d.roundVotes[current]=d.roundVotes[current]||[];
    d.roundVotes[current].push({picks,submittedAt:new Date().toISOString()});
    await save(d);
    setSubmitted(true);
    setBusy(false);
  }

  return(
    <div style={{position:"relative",zIndex:1,maxWidth:700,margin:"0 auto",padding:"24px 16px 80px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24,flexWrap:"wrap"}}>
        <BackBtn onClick={onBack}/>
        <div style={{flex:1}}>
          <h2 style={{margin:0,fontFamily:"'Georgia',serif",fontSize:20,color:"#FFD166"}}>{ROUND_NAMES[current]} — Round Vote</h2>
          <p style={{margin:0,fontSize:11,color:"rgba(255,255,255,0.35)"}}>Pick your winners · {pts} pt{pts!==1?"s":""} per correct pick · Anonymous</p>
        </div>
        <ProgPill done={Object.keys(picks).length} total={matchups.length}/>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {matchups.map(({key,top,bot,color,label})=>{
          const picked=picks[key];
          return(
            <div key={key} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontSize:8,letterSpacing:2,color:"rgba(255,255,255,0.3)",marginBottom:8}}>{label}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[[top,"top"],[bot,"bot"]].map(([movie,side])=>{
                  if(!movie) return null;
                  const sel=picked===side;
                  return(
                    <div key={side} onClick={()=>setPicks(p=>({...p,[key]:side}))}
                      style={{flex:"1 1 140px",padding:"10px 14px",borderRadius:8,cursor:"pointer",
                        background:sel?"rgba(255,107,0,0.15)":"rgba(255,255,255,0.04)",
                        border:"2px solid "+(sel?color:"rgba(255,255,255,0.08)"),
                        transition:"all 0.15s",display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:16,height:16,borderRadius:"50%",border:"2px solid "+(sel?color:"rgba(255,255,255,0.2)"),background:sel?color:"transparent",flexShrink:0}}/>
                      <span style={{fontSize:12,color:sel?"#FFFDF7":"rgba(255,255,255,0.7)",fontWeight:sel?700:400}}>{movie}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{textAlign:"center",marginTop:28}}>
        <Btn primary onClick={handleSubmit} disabled={busy} style={{fontSize:14,padding:"12px 36px"}}>
          {busy?"Saving...":"Submit My Votes"}
        </Btn>
      </div>
    </div>
  );
}

// ── Entry Screen ──────────────────────────────────────────────────────────────
function EntryScreen({appData,save,onBack}){
  const [name,setName]=useState("");
  const [dept,setDept]=useState("");
  const [picks,setPicks]=useState({});
  const [step,setStep]=useState("info");
  const [infoErr,setInfoErr]=useState("");
  const [submitErr,setSubmitErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [success,setSuccess]=useState(false);
  const entries=appData.entries||{};
  function handleInfoNext(){if(!name.trim()){setInfoErr("Please enter your name.");return;}const dup=Object.values(entries).find(e=>e.name.toLowerCase()===name.trim().toLowerCase());if(dup){setInfoErr("A bracket with that name already exists.");return;}setInfoErr("");setStep("bracket");}
  async function handleSubmit(){const done=countPicks(picks);if(done<63){setSubmitErr("Complete all picks first ("+done+"/63 done).");return;}setBusy(true);const d=JSON.parse(JSON.stringify(appData));const id="e_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);d.entries[id]={name:name.trim(),dept:dept.trim(),picks,submittedAt:new Date().toISOString()};await save(d);setSuccess(true);setBusy(false);}
  function setPick(key,val){setPicks(p=>({...p,[key]:val}));setSubmitErr("");}
  if(success)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:20,position:"relative",zIndex:1}}><div style={{fontSize:56}}>🎉</div><h2 style={{fontFamily:"'Georgia',serif",fontSize:28,color:"#06D6A0",margin:0}}>Bracket Submitted!</h2><p style={{color:"rgba(255,255,255,0.5)",textAlign:"center",maxWidth:340}}>Good luck, {name}! Check the leaderboard after each round.</p><Btn primary onClick={onBack} style={{marginTop:8}}>Back to Home</Btn></div>);
  if(step==="info")return(<div style={{position:"relative",zIndex:1,maxWidth:460,margin:"0 auto",padding:"40px 20px"}}><BackBtn onClick={onBack}/><h2 style={{fontFamily:"'Georgia',serif",fontSize:26,color:"#FFD166",margin:"16px 0 6px"}}>Your Info</h2><p style={{color:"rgba(255,255,255,0.4)",fontSize:13,marginBottom:28}}>Enter your details before picking your bracket.</p><div style={{display:"flex",flexDirection:"column",gap:14}}><label style={lblStyle}>Full Name *<input value={name} onChange={e=>{setName(e.target.value);setInfoErr("");}} placeholder="Jamie Garcia" style={iStyle}/></label><label style={lblStyle}>Department<input value={dept} onChange={e=>setDept(e.target.value)} placeholder="Tax, Audit, Advisory..." style={iStyle}/></label>{infoErr&&<Err>{infoErr}</Err>}<Btn primary onClick={handleInfoNext} style={{marginTop:8}}>Continue → Fill Bracket</Btn></div></div>);
  const regionRounds=REGIONS.map((_,ri)=>deriveRegion(ri,picks));
  const {ff,champ}=deriveFinals(picks,regionRounds);
  const done=countPicks(picks);
  return(
    <div style={{position:"relative",zIndex:1,maxWidth:960,margin:"0 auto",padding:"20px 12px 80px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <BackBtn onClick={()=>setStep("info")}/>
        <div style={{flex:1}}><h2 style={{margin:0,fontFamily:"'Georgia',serif",fontSize:20,color:"#FFD166"}}>{name}'s Bracket</h2><p style={{margin:0,fontSize:11,color:"rgba(255,255,255,0.35)"}}>{done}/63 picks · click a film to advance it</p></div>
        <ProgPill done={done} total={63}/>
        <Btn primary onClick={handleSubmit} disabled={busy}>{busy?"Saving...":"Submit Bracket"}</Btn>
      </div>
      {submitErr&&<div style={{background:"rgba(239,71,111,0.12)",border:"1px solid #EF476F",borderRadius:8,padding:"10px 14px",color:"#EF476F",fontSize:12,marginBottom:16}}>{submitErr}</div>}
      {REGIONS.map((reg,ri)=>(<RegionGrid key={ri} reg={reg} ri={ri} rounds={regionRounds[ri]} picks={picks} onPick={setPick} actuals={{}}/>))}
      <FinalsGrid ff={ff} champ={champ} picks={picks} onPick={setPick} actuals={{}}/>
      <div style={{textAlign:"center",marginTop:28}}><Btn primary onClick={handleSubmit} disabled={busy} style={{fontSize:15,padding:"13px 36px"}}>{busy?"Saving...":"Submit My Bracket ("+done+"/63)"}</Btn></div>
    </div>
  );
}

  const picks=entry.picks;

  return(

function AdminResults({appData,actuals,patch,list}){
  function tally(key){let t=0,b=0;list.forEach(([,e])=>{if(e.picks[key]==="top")t++;else if(e.picks[key]==="bot")b++;});return{t,b,total:t+b};}

  // Build matchups for ALL rounds using actual winners to determine survivors
  function getFilmForSlot(ri,rIdx,mi){
    // returns the film that occupies slot mi in round rIdx of region ri, based on actual winners
    if(rIdx===0) return {top:REGIONS[ri].movies[mi*2], bot:REGIONS[ri].movies[mi*2+1]};
    const prev0=getFilmForSlot(ri,rIdx-1,mi*2);
    const prev1=getFilmForSlot(ri,rIdx-1,mi*2+1);
    const w0=actuals[getKey(ri,rIdx-1,mi*2)];
    const w1=actuals[getKey(ri,rIdx-1,mi*2+1)];
    const top=w0?(w0==="top"?prev0.top:prev0.bot):null;
    const bot=w1?(w1==="top"?prev1.top:prev1.bot):null;
    return {top,bot};
  }

  function getRegionChamp(ri){
    const slot=getFilmForSlot(ri,3,0);
    const w=actuals[getKey(ri,3,0)];
    return w?(w==="top"?slot.top:slot.bot):null;
  }

  const c0=getRegionChamp(0),c1=getRegionChamp(1),c2=getRegionChamp(2),c3=getRegionChamp(3);
  const ff0w=actuals["ff_0"],ff1w=actuals["ff_1"];
  const ffTop=ff0w?(ff0w==="top"?c0:c1):null;
  const ffBot=ff1w?(ff1w==="top"?c2:c3):null;

  const allMatchups=[
    ...REGIONS.flatMap((reg,ri)=>[0,1,2,3].flatMap(rIdx=>{
      const count=8/Math.pow(2,rIdx);
      return Array.from({length:count},(_,mi)=>{
        const {top,bot}=getFilmForSlot(ri,rIdx,mi);
        return {key:getKey(ri,rIdx,mi),label:reg.icon+" "+reg.name+" - "+["R64","R32","Sweet 16","Elite 8"][rIdx]+" - Match "+(mi+1),top,bot,color:reg.color};
      });
    })),
    {key:"ff_0",label:"Final Four - Semifinal 1",top:c0,bot:c1,color:"#FFD166"},
    {key:"ff_1",label:"Final Four - Semifinal 2",top:c2,bot:c3,color:"#FFD166"},
    {key:"champ",label:"Championship",top:ffTop,bot:ffBot,color:"#FF6B00"},
  ];
  return(
    <div>
      <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,marginTop:0}}>Click a film to mark it as the actual winner. Scores update instantly.</p>
      {allMatchups.map(({key,label,top,bot,color})=>{
        if(!top&&!bot)return null;
        const {t,b,total}=tally(key),actual=actuals[key];
        const tp=total>0?Math.round(t/total*100):50,bp=100-tp;
        return(
          <div key={key} style={{marginBottom:8,background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"10px 12px",border:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{fontSize:8,color:"rgba(255,255,255,0.3)",letterSpacing:2,marginBottom:7}}>{label}</div>
            {[[top,"top",t,tp],[bot,"bot",b,bp]].map(([movie,side,votes,pct])=>{if(!movie)return null;const isA=actual===side;return(<div key={side} onClick={()=>patch(d=>{d.rounds.actualWinners=d.rounds.actualWinners||{};if(d.rounds.actualWinners[key]===side)delete d.rounds.actualWinners[key];else d.rounds.actualWinners[key]=side;})} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,marginBottom:3,cursor:"pointer",background:isA?"rgba(6,214,160,0.1)":"rgba(255,255,255,0.02)",border:"1px solid "+(isA?"#06D6A0":"rgba(255,255,255,0.04)"),transition:"all 0.15s"}}><div style={{width:14,height:14,borderRadius:"50%",border:"2px solid "+(isA?"#06D6A0":"rgba(255,255,255,0.15)"),background:isA?"#06D6A0":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#04252F",fontWeight:700}}>{isA&&"*"}</div><span style={{flex:1,fontSize:11,color:isA?"#06D6A0":"#FFFDF7"}}>{movie}</span><div style={{width:60,height:4,background:"rgba(255,255,255,0.07)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:color,borderRadius:2}}/></div><span style={{fontSize:10,color,minWidth:50,textAlign:"right"}}>{votes} ({pct}%)</span></div>);})}
          </div>
        );
      })}
    </div>
  );
}

function AdminRoundVotes({appData,actuals}){
  const roundVotes=appData.roundVotes||{};
  return(
    <div>
      <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,marginTop:0}}>Anonymous round votes by round. Correct picks earn points per the doubling schedule.</p>
      {ROUND_NAMES.map((name,i)=>{
        const votes=roundVotes[i]||[];
        if(votes.length===0) return(<div key={i} style={{marginBottom:8,background:"rgba(255,255,255,0.02)",borderRadius:8,padding:"10px 14px",border:"1px solid rgba(255,255,255,0.05)"}}><div style={{fontWeight:700,color:"rgba(255,255,255,0.3)",fontSize:12}}>{name}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.2)",marginTop:4}}>No votes yet</div></div>);
        const tally={};
        votes.forEach(v=>{Object.entries(v.picks||{}).forEach(([k,s])=>{tally[k]=tally[k]||{top:0,bot:0};tally[k][s]=(tally[k][s]||0)+1;});});
        const matchups=getMatchupsForRound(i,actuals);
        return(
          <div key={i} style={{marginBottom:16,background:"rgba(255,255,255,0.02)",borderRadius:10,padding:"12px 14px",border:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{fontWeight:700,color:"#FFD166",fontSize:13,marginBottom:2}}>{name}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginBottom:10}}>{votes.length} vote{votes.length!==1?"s":""} · {PTS[Math.min(i,5)]} pts per correct pick</div>
            {matchups.map(({key,top,bot,color})=>{
              const tv=tally[key]||{top:0,bot:0};
              const tot=(tv.top||0)+(tv.bot||0);
              const tp=tot>0?Math.round((tv.top||0)/tot*100):50;
              const actual=actuals[key];
              return(
                <div key={key} style={{marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:10,flex:1,textAlign:"right",color:actual==="top"?"#06D6A0":"rgba(255,255,255,0.6)"}}>{top||"TBD"} ({tv.top||0})</span>
                  <div style={{width:60,height:5,background:"rgba(255,255,255,0.07)",borderRadius:3,overflow:"hidden",flexShrink:0}}><div style={{height:"100%",width:tp+"%",background:color,borderRadius:3}}/></div>
                  <span style={{fontSize:10,flex:1,color:actual==="bot"?"#06D6A0":"rgba(255,255,255,0.6)"}}>{bot||"TBD"} ({tv.bot||0})</span>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

function AdminEntries({scored,patch,setViewId,setScreen}){
  const [q,setQ]=useState("");
  const filtered=scored.filter(e=>e.name.toLowerCase().includes(q.toLowerCase())||e.dept?.toLowerCase().includes(q.toLowerCase()));
  return(
    <div>
      <div style={{marginBottom:14}}><input placeholder="Search..." value={q} onChange={e=>setQ(e.target.value)} style={{...iStyle,maxWidth:340}}/></div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {filtered.map((e,i)=>(<div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}><span style={{width:26,textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.3)"}}>{i+1}</span><div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{e.name}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.35)"}}>{e.dept||"-"} · {countPicks(e.picks)}/63 picks · {new Date(e.submittedAt).toLocaleDateString()}</div></div><div style={{color:"#FFD166",fontWeight:700,fontSize:14}}>{e.score} pts</div><Btn onClick={()=>{setViewId(e.id);setScreen("view");}}>View</Btn><button onClick={()=>{if(window.confirm("Delete this entry?"))patch(d=>delete d.entries[e.id]);}} style={{background:"none",border:"none",color:"#EF476F",cursor:"pointer",fontSize:18,padding:"0 2px",lineHeight:1}}>×</button></div>))}
        {filtered.length===0&&<div style={{color:"rgba(255,255,255,0.3)",fontSize:13,padding:"20px",textAlign:"center"}}>No entries found.</div>}
      </div>
    </div>
  );
}

// ── Bracket Grid Components ───────────────────────────────────────────────────
function RegionGrid({reg,ri,rounds,picks,onPick,actuals}){
  const rNames=["R64","R32","Sweet 16","Elite 8"];
  return(
    <div style={{marginBottom:24,background:"rgba(255,255,255,0.02)",border:"1px solid "+reg.color+"20",borderRadius:12,padding:"14px 10px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><span style={{fontSize:16}}>{reg.icon}</span><span style={{fontFamily:"'Georgia',serif",fontSize:14,fontWeight:700,color:reg.color,letterSpacing:3}}>{reg.name} REGION</span></div>
      <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:2}}>
        {rounds.map((round,rIdx)=>(<div key={rIdx} style={{flex:rIdx===0?"2 0 155px":"1 0 108px",minWidth:rIdx===0?148:100}}><div style={{fontSize:7,letterSpacing:2,color:"rgba(255,255,255,0.25)",textAlign:"center",marginBottom:5,textTransform:"uppercase"}}>{rNames[rIdx]}</div><div style={{display:"flex",flexDirection:"column",gap:2}}>{round.map((m,mi)=>{const key=getKey(ri,rIdx,mi);return <Matchup key={mi} m={m} picked={picks[key]} actual={actuals[key]} onPick={onPick?side=>onPick(key,side):null} color={reg.color} isR0={rIdx===0} seed0={mi*2+1} seed1={mi*2+2}/>;})}</div></div>))}
      </div>
    </div>
  );
}

function FinalsGrid({ff,champ,picks,onPick,actuals}){
  const champion=getChampion(picks);
  return(
    <div style={{background:"rgba(255,209,102,0.03)",border:"1px solid rgba(255,209,102,0.12)",borderRadius:12,padding:"14px 10px",marginBottom:20}}>
      <div style={{fontFamily:"'Georgia',serif",fontSize:14,color:"#FFD166",letterSpacing:3,marginBottom:14}}>🏅 FINAL FOUR & CHAMPIONSHIP</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        {ff.map((m,i)=>(<div key={i} style={{flex:"1 1 150px"}}><div style={{fontSize:7,letterSpacing:2,color:"rgba(255,255,255,0.25)",marginBottom:5}}>SEMIFINAL {i+1}</div><Matchup m={m} picked={picks["ff_"+i]} actual={actuals["ff_"+i]} onPick={onPick?side=>onPick("ff_"+i,side):null} color="#FFD166"/></div>))}
        <div style={{flex:"1 1 150px"}}><div style={{fontSize:7,letterSpacing:2,color:"rgba(255,255,255,0.25)",marginBottom:5}}>CHAMPIONSHIP</div><Matchup m={champ} picked={picks["champ"]} actual={actuals["champ"]} onPick={onPick?side=>onPick("champ",side):null} color="#FF6B00"/></div>
        {champion&&(<div style={{flex:"1 1 130px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,textAlign:"center"}}><div style={{fontSize:26}}>🏆</div><div style={{fontSize:8,letterSpacing:2,color:"#06D6A0"}}>YOUR CHAMPION</div><div style={{fontFamily:"'Georgia',serif",fontSize:13,color:"#FFD166",fontWeight:700}}>{champion}</div></div>)}
      </div>
    </div>
  );
}

function Matchup({m,picked,actual,onPick,color,isR0,seed0,seed1}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:1.5,margin:"2px 0"}}>
      {["top","bot"].map((side,si)=>{const movie=m[side],isPicked=picked===side,isAW=actual===side,isAL=actual&&actual!==side,isRight=isAW&&isPicked,isWrong=isAL&&isPicked,empty=!movie;return(<div key={side} onClick={()=>!empty&&onPick&&onPick(side)} style={{display:"flex",alignItems:"center",gap:4,padding:"3.5px 6px",borderRadius:5,minHeight:21,background:isRight?"rgba(6,214,160,0.14)":isWrong?"rgba(239,71,111,0.08)":isPicked?(color+"18"):"rgba(255,255,255,0.04)",border:"1px solid "+(isRight?"#06D6A0":isWrong?"#EF476F":isPicked?color:"rgba(255,255,255,0.07)"),cursor:!empty&&onPick?"pointer":"default",opacity:isAL?0.32:1,transition:"all 0.13s"}}>{isR0&&<span style={{fontSize:6.5,color:color,opacity:0.6,minWidth:9,flexShrink:0}}>{si===0?seed0:seed1}</span>}<span style={{fontSize:9.5,color:isAW?"#06D6A0":empty?"rgba(255,255,255,0.2)":"#FFFDF7",flex:1,lineHeight:1.2,fontStyle:empty?"italic":"normal"}}>{empty?"TBD":movie.length>19?movie.slice(0,18)+"...":movie}</span>{isPicked&&!actual&&<span style={{fontSize:7.5,color,flexShrink:0}}>✓</span>}{isRight&&<span style={{fontSize:8,flexShrink:0}}>✅</span>}{isWrong&&<span style={{fontSize:8,flexShrink:0}}>❌</span>}{isAW&&<span style={{fontSize:8,color:"#06D6A0",flexShrink:0}}>★</span>}</div>);})}
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("home");
  const [appData,setAppData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [viewId,setViewId]=useState(null);

  useEffect(()=>{load();},[]);
  useEffect(()=>{if(screen==="home"||screen==="admin"){const t=setInterval(load,12000);return()=>clearInterval(t);}},[screen]);

  async function load(){
    try{
      const d=await dbRead();
      setAppData(d&&d.entries?d:freshData());
      setError(null);
    }catch(e){
      setError(e.message);
      if(!appData) setAppData(freshData());
    }finally{setLoading(false);}
  }

  async function save(newData){
    try{
      // re-read before write to avoid overwriting concurrent submissions
      const fresh=await dbRead();
      const merged=JSON.parse(JSON.stringify(fresh||freshData()));
      // merge entries
      if(newData.entries) Object.assign(merged.entries,newData.entries);
      // merge rounds (admin writes)
      if(newData.rounds) merged.rounds=newData.rounds;
      // merge roundVotes
      if(newData.roundVotes){
        merged.roundVotes=merged.roundVotes||{};
        Object.entries(newData.roundVotes).forEach(([r,votes])=>{
          merged.roundVotes[r]=merged.roundVotes[r]||[];
          // only add votes not already in there (by submittedAt)
          const existing=new Set(merged.roundVotes[r].map(v=>v.submittedAt));
          (votes||[]).forEach(v=>{ if(!existing.has(v.submittedAt)) merged.roundVotes[r].push(v); });
        });
      }
      await dbWrite(merged);
      setAppData(merged);
      setError(null);
    }catch(e){setError("Save failed: "+e.message);}
  }

  if(loading) return <Loader/>;

  return(
    <div style={{minHeight:"100vh",background:"#04252F",fontFamily:"'Georgia',serif",color:"#FFFDF7"}}>
      <BgGlow/>
      {error&&<ErrorBanner msg={error} onDismiss={()=>setError(null)}/>}
      {screen==="home"&&<HomeScreen appData={appData} setScreen={setScreen} setViewId={setViewId} save={save}/>}
      {screen==="entry"&&<EntryScreen appData={appData} save={save} onBack={()=>setScreen("home")}/>}
      {screen==="roundvote"&&<RoundVoteScreen appData={appData} save={save} onBack={()=>setScreen("home")}/>}
      {screen==="admin"&&<AdminScreen appData={appData} save={save} onBack={()=>setScreen("home")} setViewId={setViewId} setScreen={setScreen}/>}
      {screen==="view"&&<ViewScreen appData={appData} entryId={viewId} onBack={()=>setScreen("home")}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
